<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Giornata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{background:#F4ECDF;color:#3A2E26;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}

  .gp-center{height:100%;display:flex;align-items:center;justify-content:center;color:#8A7A6D;font-size:15px}
  .gp-shell{min-height:100%;display:flex;flex-direction:column;background:#F4ECDF}

  /* LOGIN */
  .gp-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(1200px 600px at 70% -10%,#FBEFE0 0%,#F4ECDF 55%)}
  .gp-card{width:min(400px,100%);background:#FFFDF8;border:1px solid #E4D7C2;border-radius:22px;padding:34px 30px;box-shadow:0 20px 60px rgba(90,74,61,.12)}
  .gp-card .logo{width:56px;height:56px;border-radius:17px;display:grid;place-items:center;color:#FFF8EC;font-family:'Fraunces',serif;font-weight:600;font-size:32px;margin-bottom:18px;background:linear-gradient(140deg,#C75D3A,#A8552E);box-shadow:0 6px 18px rgba(199,93,58,.32)}
  .gp-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:28px;letter-spacing:-.4px}
  .gp-card .lead{color:#8A7A6D;font-size:14px;font-weight:600;margin:6px 0 22px}
  .gp-err{background:#F8E9E9;color:#9E4444;border:1px solid #E8C9C9;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;margin-bottom:14px}
  .gp-switch{margin-top:16px;font-size:13px;color:#8A7A6D;font-weight:600;text-align:center}
  .gp-switch button{background:none;border:none;color:#C75D3A;font-weight:800;cursor:pointer;font-size:13px}

  /* HEADER */
  .gp-header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:14px 20px;background:rgba(247,241,232,.92);backdrop-filter:blur(10px);border-bottom:1px solid #E4D7C2}
  .gp-brand{display:flex;align-items:center;gap:12px}
  .gp-logo{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:#FFF8EC;font-family:'Fraunces',serif;font-weight:600;font-size:24px;background:linear-gradient(140deg,#C75D3A,#A8552E);box-shadow:0 4px 14px rgba(199,93,58,.3)}
  .gp-title{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.3px;line-height:1}
  .gp-sub{font-size:12.5px;color:#8A7A6D;font-weight:600;margin-top:3px}
  .gp-controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap}

  .gp-seg{display:flex;background:#EADFCB;border-radius:11px;padding:3px}
  .gp-seg button{display:flex;align-items:center;gap:5px;border:none;background:none;cursor:pointer;padding:7px 11px;border-radius:8px;font-size:12.5px;font-weight:700;color:#8A7A6D;transition:.18s;font-family:inherit}
  .gp-seg button.on{background:#FFFDF8;color:#3A2E26;box-shadow:0 1px 4px rgba(0,0,0,.08)}

  .gp-nav{display:flex;align-items:center;gap:4px}
  .gp-nav button{border:1px solid #E4D7C2;background:#FFFDF8;cursor:pointer;height:34px;min-width:34px;border-radius:9px;display:grid;place-items:center;color:#5A4A3D;font-weight:700;font-size:13px;transition:.15s;font-family:inherit}
  .gp-nav button:hover{background:#F4ECDF}
  .gp-nav .today{padding:0 12px}

  .gp-select{border:1px solid #E4D7C2;background:#FFFDF8;border-radius:10px;padding:8px 10px;font-size:13px;font-weight:700;color:#5A4A3D;font-family:inherit;cursor:pointer;outline:none}
  .gp-select:focus{border-color:#C75D3A}

  .gp-btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;padding:9px 14px;border:1px solid transparent;transition:.15s;font-family:inherit}
  .gp-btn.solid{background:#C75D3A;color:#FFF8EC;box-shadow:0 3px 10px rgba(199,93,58,.28)}
  .gp-btn.solid:hover{background:#B5502F}
  .gp-btn.ghost{background:#FFFDF8;border-color:#E4D7C2;color:#5A4A3D}
  .gp-btn.ghost:hover{background:#F4ECDF}
  .gp-btn.ghost.danger{color:#9E4444;border-color:#E8C9C9}
  .gp-btn.ghost.danger:hover{background:#F8E9E9}
  .gp-btn.sm{padding:7px 12px;font-size:12.5px}
  .gp-btn.block{width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:6px}
  .gp-btn:disabled{opacity:.5;cursor:not-allowed}

  /* AREA CONTENUTO */
  .gp-wrap{flex:1;padding:16px 20px 24px;min-height:0}
  .gp-panel{background:#FFFDF8;border:1px solid #E4D7C2;border-radius:16px;box-shadow:0 8px 30px rgba(90,74,61,.06)}

  /* CALENDARIO GIORNO/SETTIMANA */
  .gp-cal{height:calc(100vh - 150px);min-height:420px;overflow:auto}
  .gp-weekhead{position:sticky;top:0;z-index:12;display:grid;background:#FFFDF8;border-bottom:1px solid #EADFCB}
  .gp-wh{padding:9px 4px;text-align:center;border-left:1px solid #F0E7D6}
  .gp-wh .wd{display:block;font-size:11px;font-weight:700;color:#8A7A6D;text-transform:uppercase;letter-spacing:.5px}
  .gp-wh .dn{display:inline-grid;place-items:center;width:26px;height:26px;margin-top:3px;font-size:14px;font-weight:800;border-radius:50%}
  .gp-wh.today .dn{background:#C75D3A;color:#FFF8EC}
  .gp-wh.today .wd{color:#C75D3A}
  .gp-grid{display:grid;position:relative}
  .gp-gutter-col{border-right:1px solid #EADFCB}
  .gp-hourlabel{position:relative;display:flex;justify-content:flex-end;padding-right:8px}
  .gp-hourlabel span{font-size:11px;color:#A89683;font-weight:700;transform:translateY(-7px)}
  .gp-daycol{position:relative;border-left:1px solid #F0E7D6;cursor:copy}
  .gp-slot{border-bottom:1px solid #F4ECDE}
  .gp-slot:nth-child(odd){background:#FFFDF8}
  .gp-nowline{position:absolute;left:0;right:0;height:0;border-top:2px solid #C75D3A;z-index:8;pointer-events:none}
  .gp-nowline span{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#C75D3A}
  .gp-event{position:absolute;z-index:6;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;text-align:left;overflow:hidden;display:flex;flex-direction:column;gap:1px;transition:.12s;box-shadow:0 1px 3px rgba(90,74,61,.1);font-family:inherit}
  .gp-event:hover{filter:brightness(.97);box-shadow:0 3px 9px rgba(90,74,61,.18);z-index:9}
  .gp-event.done{opacity:.55}
  .gp-event.done .ev-title{text-decoration:line-through}
  .ev-title{font-size:12.5px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-time{font-size:10.5px;font-weight:700;color:#7A6A5C}
  .ev-note{font-size:10.5px;color:#8A7A6D;line-height:1.25;overflow:hidden}

  /* MESE */
  .gp-month{padding:0}
  .gp-mhead{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #EADFCB}
  .gp-mhead div{padding:10px 6px;text-align:center;font-size:11px;font-weight:800;color:#8A7A6D;text-transform:uppercase;letter-spacing:.5px}
  .gp-mgrid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;min-height:calc(100vh - 210px)}
  .gp-mcell{border-left:1px solid #F0E7D6;border-bottom:1px solid #F0E7D6;padding:6px;min-height:96px;cursor:copy;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .gp-mcell:nth-child(7n+1){border-left:none}
  .gp-mcell.out{background:#FBF6EC}
  .gp-mcell .mday{font-size:12.5px;font-weight:800;color:#8A7A6D;align-self:flex-end}
  .gp-mcell.out .mday{color:#C9BBA6}
  .gp-mcell.today .mday{background:#C75D3A;color:#FFF8EC;width:24px;height:24px;border-radius:50%;display:grid;place-items:center}
  .gp-pill{display:flex;align-items:center;gap:5px;border-radius:6px;padding:2px 6px;font-size:11px;font-weight:700;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:none;text-align:left;width:100%;font-family:inherit}
  .gp-pill.done{opacity:.5;text-decoration:line-through}
  .gp-pill .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .gp-more{font-size:10.5px;font-weight:700;color:#A89683;padding-left:4px}

  /* GANTT */
  .gp-gantt-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
  .gp-kpi{background:#FFFDF8;border:1px solid #E4D7C2;border-radius:14px;padding:14px 16px;box-shadow:0 4px 14px rgba(90,74,61,.05)}
  .gp-kpi .klabel{font-size:11px;font-weight:800;color:#8A7A6D;text-transform:uppercase;letter-spacing:.4px}
  .gp-kpi .kval{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin-top:4px;line-height:1}
  .gp-kpi.late .kval{color:#9E4444}
  .gp-kpi.done .kval{color:#4A7058}
  .gp-gantt{overflow:auto;max-height:calc(100vh - 280px)}
  .gp-gantt-inner{min-width:max-content}
  .gp-grow{display:flex;align-items:stretch;border-bottom:1px solid #F4ECDE}
  .gp-glabel{width:230px;min-width:230px;padding:7px 12px;display:flex;align-items:center;gap:8px;position:sticky;left:0;background:#FFFDF8;z-index:5;border-right:1px solid #EADFCB}
  .gp-gtrack{position:relative;flex:1;display:flex}
  .gp-gcell{width:38px;min-width:38px;border-left:1px solid #F4ECDE;height:42px}
  .gp-gcell.we{background:#FBF6EC}
  .gp-ghead .gp-glabel{background:#FFFDF8;font-weight:800;color:#8A7A6D;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .gp-ghead{position:sticky;top:0;z-index:8;background:#FFFDF8;border-bottom:1px solid #EADFCB}
  .gp-gdh{width:38px;min-width:38px;border-left:1px solid #F4ECDE;text-align:center;padding:5px 0;font-size:10px;font-weight:700;color:#A89683;line-height:1.2}
  .gp-gdh .wd{display:block;font-size:9px;text-transform:uppercase}
  .gp-gdh.today{background:#FCEDE5}
  .gp-gdh.today .dn{color:#C75D3A}
  .gp-gbu{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F8F0E2;border-bottom:1px solid #EADFCB;border-top:1px solid #EADFCB;font-weight:800;font-size:13px;position:sticky;left:0}
  .gp-gbu .dot{width:11px;height:11px;border-radius:50%}
  .gp-gbu .cnt{font-size:11px;font-weight:700;color:#A89683;margin-left:auto}
  .gp-gbar{position:absolute;top:9px;height:24px;border-radius:7px;display:flex;align-items:center;padding:0 8px;cursor:pointer;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:0 1px 4px rgba(90,74,61,.18);z-index:3}
  .gp-gbar.done{opacity:.5}
  .gp-gnow{position:absolute;top:0;bottom:0;width:2px;background:#C75D3A;z-index:4;pointer-events:none}
  .gp-check{width:19px;height:19px;border-radius:6px;border:2px solid #CBB99D;cursor:pointer;flex-shrink:0;display:grid;place-items:center;background:#fff;transition:.12s}
  .gp-check.on{background:#4A7058;border-color:#4A7058}
  .gp-gname{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gp-gname.done{text-decoration:line-through;color:#A89683}
  .gp-empty{padding:50px 20px;text-align:center;color:#A89683;font-weight:600}
  .gp-arch-month{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:#5A4A3D;padding:14px 18px 8px}
  .gp-arch-row{display:flex;align-items:center;gap:8px;padding:5px 16px}
  .gp-arch-main{flex:1;display:flex;align-items:center;gap:10px;background:#FFFDF8;border:1px solid #E4D7C2;border-radius:11px;padding:11px 13px;cursor:pointer;text-align:left;font-family:inherit;transition:.15s}
  .gp-arch-main:hover{background:#F4ECDF}
  .gp-arch-main .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .gp-arch-title{flex:1;font-weight:700;font-size:14px;text-decoration:line-through;color:#7A6A5C}
  .gp-arch-bu{font-size:10.5px;font-weight:800;color:#fff;padding:2px 8px;border-radius:20px}
  .gp-arch-date{font-size:12px;font-weight:700;color:#A89683;white-space:nowrap}
  .gp-radd{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .gp-radd .gp-input{flex:1;min-width:160px}
  .gp-rdate{max-width:160px;flex:0 0 auto}
  .gp-rlist{display:flex;flex-direction:column;gap:7px}
  .gp-rrow{display:flex;align-items:center;gap:10px;background:#FFFDF8;border:1px solid #E4D7C2;border-radius:11px;padding:10px 13px}
  .gp-rtext{flex:1;font-weight:700;font-size:14px;cursor:text}
  .gp-rtext.done{text-decoration:line-through;color:#A89683}
  .gp-rrow .gp-input{flex:1;padding:6px 10px}
  .gp-rdue{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;background:#EADFCB;color:#7A6A5C;white-space:nowrap}
  .gp-rdue.late{background:#F8E9E9;color:#9E4444}
  .gp-rdue.today{background:#FCEDE5;color:#C75D3A}
  .gp-rsep{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:#8A7A6D;margin:18px 0 10px}
  .gp-rt{border:1px solid #E0D2BC;border-radius:11px;overflow:hidden;background:#FFFDF8}
  .gp-rt-bar{display:flex;align-items:center;gap:3px;padding:6px;border-bottom:1px solid #EADFCB;background:#FBF5EA;flex-wrap:wrap}
  .gp-rt-btn{min-width:30px;height:30px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:14px;color:#5A4A3D;display:inline-flex;align-items:center;justify-content:center;font-family:inherit}
  .gp-rt-btn:hover{background:#EADFCB}
  .gp-rt-div{width:1px;height:18px;background:#E0D2BC;margin:0 3px}
  .gp-rt-area{min-height:90px;max-height:240px;overflow-y:auto;padding:10px 12px;font-size:14px;line-height:1.5;outline:none;color:#3A2E26}
  .gp-rt-area:empty:before{content:"Dettagli, luogo, promemoria…";color:#A89683}
  .gp-rt-area ul,.gp-rt-area ol{padding-left:22px;margin:4px 0}
  .gp-rt-area h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:8px 0 2px;line-height:1.25}
  .gp-rt-area h3{font-size:15px;font-weight:800;margin:6px 0 2px;color:#5A4A3D}
  .gp-rt-area mark{background:#FCE6A8;color:inherit;border-radius:3px;padding:0 2px}
  .gp-rt-area ul.gp-ck{list-style:none;padding-left:2px;margin:4px 0}
  .gp-rt-area ul.gp-ck li{position:relative;padding-left:27px;margin:3px 0;cursor:pointer}
  .gp-rt-area ul.gp-ck li::before{content:"";position:absolute;left:0;top:1px;width:17px;height:17px;border:2px solid #CBB99D;border-radius:6px;background:#fff;box-sizing:border-box}
  .gp-rt-area ul.gp-ck li.on::before{background:#4A7058;border-color:#4A7058}
  .gp-rt-area ul.gp-ck li.on::after{content:"";position:absolute;left:6px;top:4px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .gp-rt-area ul.gp-ck li.on{color:#A89683;text-decoration:line-through}
  .gp-rt-btn.wide{min-width:auto;padding:0 9px;font-size:12px;font-weight:800}
  .gp-pri-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .gp-pri-title{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:#5A4A3D}
  .gp-prow{display:flex;align-items:center;gap:10px;background:#FFFDF8;border:1px solid #E4D7C2;border-radius:11px;padding:9px 12px}
  .gp-pnum{width:24px;height:24px;border-radius:7px;color:#fff;font-weight:800;font-size:12px;display:grid;place-items:center;flex-shrink:0}
  .gp-pmain{flex:1;display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit;padding:0;min-width:0}
  .gp-pname{flex:1;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gp-pmove{display:flex;gap:4px;flex-shrink:0}
  .gp-icon.sm:disabled{opacity:.35;cursor:not-allowed}

  /* PRIORITÀ SETTIMANALE */
  .gp-pw-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .gp-pw-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:#5A4A3D}
  .gp-daychips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 6px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .gp-daychip{flex:0 0 auto;min-width:58px;border:1.5px solid #E4D7C2;background:#FFFDF8;border-radius:13px;padding:8px 6px;cursor:pointer;text-align:center;font-family:inherit;transition:.15s}
  .gp-daychip .wd{display:block;font-size:10px;font-weight:800;color:#8A7A6D;text-transform:uppercase;letter-spacing:.4px}
  .gp-daychip .dn{display:block;font-size:18px;font-weight:800;color:#3A2E26;line-height:1.2;margin-top:1px}
  .gp-daychip .cb{display:block;font-size:10px;font-weight:700;color:#A89683;margin-top:1px;min-height:13px}
  .gp-daychip.on{border-color:#C75D3A;background:#FFF6ED;box-shadow:0 3px 10px rgba(199,93,58,.16)}
  .gp-daychip.on .dn{color:#C75D3A}
  .gp-daychip.today .wd{color:#C75D3A}
  .gp-daychip.is-drop{border-color:#C75D3A;border-style:dashed;background:#FCEDE5;transform:translateY(-2px)}

  .gp-late{border:1.5px solid #E8C9C9;background:#FBEFEF;border-radius:14px;padding:11px 13px;margin-bottom:16px}
  .gp-late-h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;color:#9E4444;margin-bottom:9px}
  .gp-late-h .badge{margin-left:auto;background:#9E4444;color:#fff;border-radius:20px;padding:1px 9px;font-size:11px}
  .gp-late-hint{font-size:11.5px;font-weight:700;color:#B47A7A;margin-bottom:9px}
  .gp-late-list{display:flex;flex-wrap:wrap;gap:8px}

  .gp-buckets{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .gp-bucket{border:1.5px solid #E4D7C2;background:#FFFDF8;border-radius:16px;padding:13px;display:flex;flex-direction:column;min-height:120px;transition:.15s}
  .gp-bucket.is-drop{border-color:var(--bk,#C75D3A);border-style:dashed;background:#FFF9F1}
  .gp-bucket-h{display:flex;align-items:center;gap:8px;margin-bottom:11px}
  .gp-bucket-dot{width:13px;height:13px;border-radius:5px;flex-shrink:0}
  .gp-bucket-name{font-weight:800;font-size:14px;color:#3A2E26}
  .gp-bucket-cnt{margin-left:auto;font-size:11px;font-weight:800;color:#A89683;background:#F0E7D6;border-radius:20px;padding:2px 9px}
  .gp-bucket-cnt.over{background:#F8E9E9;color:#9E4444}
  .gp-bucket-body{display:flex;flex-direction:column;gap:8px;flex:1}
  .gp-bucket-empty{font-size:12px;font-weight:700;color:#C2B4A0;text-align:center;padding:14px 6px;border:1.5px dashed #E4D7C2;border-radius:11px}

  .gp-pchip{display:flex;align-items:center;gap:9px;background:#FFFDF8;border:1px solid #E4D7C2;border-radius:11px;padding:8px 10px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;box-shadow:0 1px 3px rgba(90,74,61,.06);transition:box-shadow .12s}
  .gp-pchip:active{cursor:grabbing}
  .gp-pchip .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

  }catch(e){const m={"auth/invalid-credential":"Email o password non corretti.","auth/invalid-email":"Email non valida.","auth/weak-password":"La password deve avere almeno 6 caratteri.","auth/email-already-in-use":"Email già registrata. Accedi.","auth/wrong-password":"Password errata.","auth/user-not-found":"Nessun account con questa email."};setErr(m[e.code]||"Errore: "+(e.code||e.message));}finally{setBusy(false);}};
  return (
    <div className="gp-login"><div className="gp-card">
      <div className="logo">G</div><h1>Giornata</h1>
      <p className="lead">{mode==="signin"?"Accedi alla tua agenda":"Crea il tuo accesso"}</p>
      {err && <div className="gp-err">{err}</div>}
      <label className="gp-lbl">Email</label>
      <input className="gp-input" type="email" value={email} onChange={(e)=>setEmail(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} placeholder="tu@email.it"/>
      <label className="gp-lbl">Password</label>
      <input className="gp-input" type="password" value={pw} onChange={(e)=>setPw(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} placeholder="••••••••"/>
      <button className="gp-btn solid block" disabled={busy||!email||!pw} onClick={submit}>{busy?"Attendi…":(mode==="signin"?"Entra":"Registrati")}</button>
      <div className="gp-switch">{mode==="signin"?<span>Primo accesso? <button onClick={()=>{setMode("signup");setErr("");}}>Registrati</button></span>:<span>Hai già un account? <button onClick={()=>{setMode("signin");setErr("");}}>Accedi</button></span>}</div>
    </div></div>
  );
}

/* ================= SCHEDULER ================= */
function Scheduler({user}){
  const [activities,setActivities]=useState([]);
  const [events,setEvents]=useState([]);
  const [bus,setBus]=useState([]);
  const [reminders,setReminders]=useState([]);
  const [view,setView]=useState("day");
  const [cursor,setCursor]=useState(()=>startOfDay(new Date()));
  const [ganttStart,setGanttStart]=useState(()=>startOfWeek(new Date()));
  const [buFilter,setBuFilter]=useState("all");
  const [manage,setManage]=useState(null); // null | "activities" | "bu"
  const [editing,setEditing]=useState(null);

  useEffect(()=>{
    const a=db.collection("activities").where("uid","==",user.uid).onSnapshot((s)=>setActivities(s.docs.map((d)=>({id:d.id,...d.data()}))));
    const e=db.collection("events").where("uid","==",user.uid).onSnapshot((s)=>setEvents(s.docs.map((d)=>({id:d.id,...d.data()}))));
    const b=db.collection("bus").where("uid","==",user.uid).onSnapshot((s)=>setBus(s.docs.map((d)=>({id:d.id,...d.data()}))));
    const r=db.collection("reminders").where("uid","==",user.uid).onSnapshot((s)=>setReminders(s.docs.map((d)=>({id:d.id,...d.data()}))));
    return ()=>{a();e();b();r();};
  },[user.uid]);

  /* CRUD */
  const seedActivities=async()=>{const b=db.batch();DEFAULT_ACTIVITIES.forEach((a)=>b.set(db.collection("activities").doc(),{...a,buId:null,uid:user.uid}));await b.commit();};
  const seedBus=async()=>{const b=db.batch();DEFAULT_BUS.forEach((x)=>b.set(db.collection("bus").doc(),{...x,uid:user.uid}));await b.commit();};
  const upsertActivity=async(a)=>{const p={name:a.name,color:a.color,dur:a.dur,buId:a.buId||null,uid:user.uid};a.id?await db.collection("activities").doc(a.id).set(p):await db.collection("activities").add(p);};
  const removeActivity=(id)=>db.collection("activities").doc(id).delete();
  const upsertBu=async(x)=>{const p={name:x.name,color:x.color,uid:user.uid};x.id?await db.collection("bus").doc(x.id).set(p):await db.collection("bus").add(p);};
  const removeBu=(id)=>db.collection("bus").doc(id).delete();
  const saveEvent=async(ev)=>{const p={activityId:ev.activityId,buId:ev.buId||null,title:ev.title,color:ev.color,note:ev.note,done:!!ev.done,inCalendar:ev.inCalendar!==false,inGantt:ev.inGantt!==false,priorityLevel:ev.priorityLevel??null,start:ev.start,end:ev.end,uid:user.uid};ev.id?await db.collection("events").doc(ev.id).set(p):await db.collection("events").add(p);};
  const deleteEvent=async(id)=>{await db.collection("events").doc(id).delete();setEditing(null);};
  const reorderPriorities=(ids)=>{const b=db.batch();ids.forEach((id,i)=>b.update(db.collection("events").doc(id),{priority:i}));return b.commit();};
  const setPriorityLevel=(id,level)=>db.collection("events").doc(id).update({priorityLevel:level||null});
  const moveEventToDay=(ev,dayKey,level)=>{
    const s=new Date(ev.start),e=new Date(ev.end);const dur=Math.max(60000,e-s);
    const ns=combine(dayKey,timeStr(s));const ne=new Date(ns.getTime()+dur);
    const patch={start:ns.toISOString(),end:ne.toISOString()};
    if(level!==undefined)patch.priorityLevel=level||null;
    return db.collection("events").doc(ev.id).update(patch);
  };
  const submitEvent=async(d)=>{
    const base={activityId:d.activityId,buId:d.buId||null,title:(d.title.trim()||"Senza titolo"),color:d.color,note:d.note,done:!!d.done,inCalendar:d.inCalendar!==false,inGantt:d.inGantt!==false,priority:d.priority??null,priorityLevel:d.priorityLevel??null,uid:user.uid};
    const deltaDays=daysBetween(fromDateKey(d.startDate),fromDateKey(d.endDate));
    const mk=(dayKey)=>{const start=combine(dayKey,d.startTime);let end=combine(toDateKey(addDays(fromDateKey(dayKey),deltaDays)),d.endTime);if(end<=start)end=new Date(start.getTime()+30*60000);return {start:start.toISOString(),end:end.toISOString()};};
    if(d._isNew && d.repeat && d.repeat!=="none"){
      const until=d.repeatUntil?fromDateKey(d.repeatUntil):addDays(fromDateKey(d.startDate),30);
      const dates=[];let cur=fromDateKey(d.startDate),guard=0;
      while(cur<=until && guard<400){const wd=(cur.getDay()+6)%7;let ok=false;
        if(d.repeat==="daily")ok=true;else if(d.repeat==="weekly")ok=daysBetween(fromDateKey(d.startDate),cur)%7===0;else if(d.repeat==="custom")ok=(d.repeatDays||[]).includes(wd);
        if(ok)dates.push(toDateKey(cur));cur=addDays(cur,1);guard++;}
      if(dates.length===0)dates.push(d.startDate);
      const seriesId="s-"+Date.now();const batch=db.batch();
      dates.slice(0,366).forEach((k)=>{const {start,end}=mk(k);batch.set(db.collection("events").doc(),{...base,start,end,seriesId});});
      await batch.commit();
    } else {
      const {start,end}=mk(d.startDate);
      d.id?await db.collection("events").doc(d.id).set({...base,start,end}):await db.collection("events").add({...base,start,end});
    }
    setEditing(null);
  };
  const toggleDone=(ev)=>db.collection("events").doc(ev.id).update({done:!ev.done});
  const addReminder=(text,due)=>db.collection("reminders").add({text,due:due||"",done:false,createdAt:Date.now(),uid:user.uid});
  const updateReminder=(id,patch)=>db.collection("reminders").doc(id).update(patch);
  const deleteReminder=(id)=>db.collection("reminders").doc(id).delete();

  const buMap=useMemo(()=>{const m={};bus.forEach((b)=>m[b.id]=b);return m;},[bus]);
  const shown=useMemo(()=>buFilter==="all"?events:events.filter((e)=>(e.buId||null)===(buFilter===NOBU?null:buFilter)),[events,buFilter]);

  const days=useMemo(()=>{
    if(view==="day") return [new Date(cursor)];
    if(view==="week"){const s=startOfWeek(cursor);return Array.from({length:7},(_,i)=>addDays(s,i));}
    return [];
  },[view,cursor]);

  const shift=(n)=>{
    if(view==="month") setCursor((c)=>new Date(c.getFullYear(),c.getMonth()+n,1));
    else if(view==="gantt") setGanttStart((g)=>addDays(g,n*7));
    else setCursor((c)=>addDays(c,view==="day"?n:n*7));
  };
  const goToday=()=>{setCursor(startOfDay(new Date()));setGanttStart(startOfWeek(new Date()));};

  const periodLabel=useMemo(()=>{
    if(view==="day"){const d=cursor;return `${WEEKDAYS[(d.getDay()+6)%7]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
    if(view==="week"){const s=days[0],e=days[6];return s.getMonth()===e.getMonth()?`${s.getDate()}–${e.getDate()} ${MONTHS[s.getMonth()]} ${s.getFullYear()}`:`${s.getDate()} ${MONTHS[s.getMonth()].slice(0,3)} – ${e.getDate()} ${MONTHS[e.getMonth()].slice(0,3)} ${e.getFullYear()}`;}
    if(view==="month") return `${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}`;
    if(view==="priority") return "Priorità · pianificazione settimanale";
    if(view==="reminders"){const n=reminders.filter((r)=>!r.done).length;return `Promemoria · ${n} da fare`;}
    if(view==="archive"){const n=shown.filter((e)=>e.done).length;return `Archivio · ${n} ${n===1?"completata":"completate"}`;}
    const e=addDays(ganttStart,GANTT_DAYS-1);return `${ganttStart.getDate()} ${MONTHS[ganttStart.getMonth()].slice(0,3)} – ${e.getDate()} ${MONTHS[e.getMonth()].slice(0,3)}`;
  },[view,cursor,days,ganttStart,shown,reminders]);

  const defaultBu=()=>buFilter!=="all"&&buFilter!==NOBU?buFilter:null;
  const newEventAt=(dateKey,hour,minute=0,activity=null)=>{
    const endMin=minute+(activity?.dur??60);let eh=hour+Math.floor(endMin/60),em=endMin%60;if(eh>=24){eh=23;em=59;}
    setEditing({id:null,activityId:activity?.id??null,buId:activity?.buId??defaultBu(),title:activity?.name??"",color:activity?.color??PALETTE[0],startDate:dateKey,startTime:`${pad(hour)}:${pad(minute)}`,endDate:dateKey,endTime:`${pad(eh)}:${pad(em)}`,note:"",done:false,inCalendar:true,inGantt:true,priority:null,priorityLevel:null,repeat:"none",repeatUntil:"",repeatDays:[],_isNew:true});
  };
  const openEvent=(ev)=>{const s=new Date(ev.start),e=new Date(ev.end);setEditing({id:ev.id,activityId:ev.activityId,buId:ev.buId||null,title:ev.title,color:ev.color,startDate:toDateKey(s),startTime:timeStr(s),endDate:toDateKey(e),endTime:timeStr(e),note:ev.note||"",done:!!ev.done,inCalendar:ev.inCalendar!==false,inGantt:ev.inGantt!==false,priority:ev.priority??null,priorityLevel:ev.priorityLevel??null,_isNew:false});};

  const VIEWS=[["day","Giorno","calendar"],["week","Settimana","calendar"],["month","Mese","grid"],["gantt","Gantt","gantt"],["priority","Priorità","flag"],["reminders","Promemoria","bell"],["archive","Archivio","archive"]];

  return (
    <div className="gp-shell">
      <header className="gp-header">
        <div className="gp-brand"><div className="gp-logo">G</div><div><div className="gp-title">Giornata</div><div className="gp-sub">{periodLabel}</div></div></div>
        <div className="gp-controls">
          <div className="gp-seg">
            {VIEWS.map(([v,lbl,ic])=>(<button key={v} className={view===v?"on":""} onClick={()=>setView(v)}><Icon name={ic} size={14}/> <span className="hide-sm">{lbl}</span></button>))}
          </div>
          {view!=="archive" && view!=="reminders" && view!=="priority" && <div className="gp-nav"><button onClick={()=>shift(-1)}><Icon name="left"/></button><button className="today" onClick={goToday}>Oggi</button><button onClick={()=>shift(1)}><Icon name="right"/></button></div>}
          {view!=="reminders" && (<select className="gp-select" value={buFilter} onChange={(e)=>setBuFilter(e.target.value)}>
            <option value="all">Tutte le BU</option>
            {bus.map((b)=><option key={b.id} value={b.id}>{b.name}</option>)}
            <option value={NOBU}>Senza BU</option>
          </select>)}
          <button className="gp-icon" title="Gestisci attività e BU" onClick={()=>setManage("activities")}><Icon name="settings" size={17}/></button>
          <button className="gp-btn solid" onClick={()=>newEventAt(toDateKey(view==="day"||view==="month"?cursor:new Date()),new Date().getHours())}><Icon name="plus" size={16}/> <span className="hide-sm">Nuovo</span></button>
          <button className="gp-icon" title="Esci" onClick={()=>auth.signOut()}><Icon name="logout" size={16}/></button>
        </div>
      </header>

      <main className="gp-wrap">
        {(view==="day"||view==="week") &&
          <div className="gp-panel"><DayWeek days={days} view={view} events={shown.filter((e)=>e.inCalendar!==false)} buMap={buMap} onSlot={newEventAt} onEvent={openEvent}/></div>}
        {view==="month" &&
          <div className="gp-panel gp-month"><MonthView cursor={cursor} events={shown.filter((e)=>e.inCalendar!==false)} buMap={buMap} onDay={(k)=>newEventAt(k,9)} onEvent={openEvent}/></div>}
        {view==="gantt" &&
          <GanttView start={ganttStart} events={shown.filter((e)=>e.inGantt!==false)} bus={bus} buFilter={buFilter} onNew={()=>newEventAt(toDateKey(new Date()),9)} onEvent={openEvent} onToggle={toggleDone}/>}
        {view==="archive" &&
          <ArchiveView events={shown.filter((e)=>e.done)} buMap={buMap} onEvent={openEvent} onToggle={toggleDone} onDelete={deleteEvent}/>}
        {view==="priority" &&
          <PriorityView events={shown} bus={bus} buMap={buMap} onEvent={openEvent} onToggle={toggleDone} onReorder={reorderPriorities} onSetLevel={setPriorityLevel} onMoveDay={moveEventToDay}/>}
        {view==="reminders" &&
          <ReminderView reminders={reminders} onAdd={addReminder} onUpdate={updateReminder} onDelete={deleteReminder}/>}
      </main>

      {manage && <ManageDrawer tab={manage} setTab={setManage} activities={activities} bus={bus} buMap={buMap}
        onClose={()=>setManage(null)} onUpsertAct={upsertActivity} onRemoveAct={removeActivity} onSeedAct={seedActivities}
        onUpsertBu={upsertBu} onRemoveBu={removeBu} onSeedBu={seedBus}
        onUse={(a)=>{setManage(null);newEventAt(toDateKey(view==="day"||view==="month"?cursor:new Date()),new Date().getHours(),0,a);}}/>}

      {editing && <EventModal draft={editing} activities={activities} bus={bus} onChange={setEditing} onClose={()=>setEditing(null)} onDelete={deleteEvent} onSave={submitEvent}/>}
    </div>
  );
}

/* ---- Giorno / Settimana ---- */
function DayWeek({days,view,events,buMap,onSlot,onEvent}){
  const ref=useRef(null);
  const hours=Array.from({length:DAY_END-DAY_START},(_,i)=>DAY_START+i);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=(7-DAY_START)*HOUR_H-20;},[view]);
  const handleClick=(e,day)=>{const r=e.currentTarget.getBoundingClientRect();let m=((e.clientY-r.top)/HOUR_H)*60+DAY_START*60;m=Math.max(0,Math.round(m/15)*15);const h=Math.floor(m/60);if(h>=24)return;onSlot(toDateKey(day),h,m%60);};
  const dayEvents=(day)=>{const ws=new Date(day);ws.setHours(DAY_START,0,0,0);const we=new Date(day);we.setHours(DAY_END,0,0,0);
    return layoutDay(events.filter((ev)=>new Date(ev.end)>ws&&new Date(ev.start)<we).map((ev)=>({...ev,_s:Math.max(0,minutesInDay(new Date(ev.start),day)),_e:Math.min((DAY_END-DAY_START)*60,minutesInDay(new Date(ev.end),day))})));};
  const tmpl=`56px repeat(${days.length}, minmax(${view==="week"?"110px":"0"}, 1fr))`;
  return (
    <div className="gp-cal" ref={ref}>
      {view==="week" && <div className="gp-weekhead" style={{gridTemplateColumns:tmpl}}><div/>{days.map((d)=>(<div key={toDateKey(d)} className={`gp-wh ${sameDay(d,new Date())?"today":""}`}><span className="wd">{WEEKDAYS[(d.getDay()+6)%7]}</span><span className="dn">{d.getDate()}</span></div>))}</div>}
      <div className="gp-grid" style={{gridTemplateColumns:tmpl}}>
        <div className="gp-gutter-col">{hours.map((h)=><div key={h} className="gp-hourlabel" style={{height:HOUR_H}}><span>{pad(h)}:00</span></div>)}</div>
        {days.map((day)=>{const evs=dayEvents(day);const now=new Date();const sn=sameDay(day,now);const nt=(minutesInDay(now,day)/60)*HOUR_H;
          return (<div key={toDateKey(day)} className="gp-daycol" style={{height:(DAY_END-DAY_START)*HOUR_H}} onClick={(e)=>handleClick(e,day)}>
            {hours.map((h)=><div key={h} className="gp-slot" style={{height:HOUR_H}}/>)}
            {sn&&nt>=0&&nt<=(DAY_END-DAY_START)*HOUR_H&&<div className="gp-nowline" style={{top:nt}}><span/></div>}
            {evs.map((ev)=>{const top=(ev._s/60)*HOUR_H;const height=Math.max(20,((ev._e-ev._s)/60)*HOUR_H-3);const w=100/ev._cols;
              return (<button key={ev.id} className={`gp-event ${ev.done?"done":""}`} style={{top,height,left:`calc(${ev._lane*w}% + 3px)`,width:`calc(${w}% - 6px)`,background:hexToRgba(ev.color,0.16),borderLeft:`3px solid ${ev.color}`}} onClick={(e)=>{e.stopPropagation();onEvent(ev);}}>
                <span className="ev-title" style={{color:ev.color}}>{ev.title}</span>
                {height>34&&<span className="ev-time">{timeStr(new Date(ev.start))}–{timeStr(new Date(ev.end))}{ev.buId&&buMap[ev.buId]?" · "+buMap[ev.buId].name:""}</span>}
                {stripHtml(ev.note)&&height>56&&<span className="ev-note">{stripHtml(ev.note)}</span>}
              </button>);})}
          </div>);})}
      </div>
    </div>
  );
}

/* ---- Mese ---- */
function MonthView({cursor,events,buMap,onDay,onEvent}){
  const first=new Date(cursor.getFullYear(),cursor.getMonth(),1);
  const gridStart=startOfWeek(first);
  const cells=Array.from({length:42},(_,i)=>addDays(gridStart,i));
  const byDay=useMemo(()=>{const m={};events.forEach((ev)=>{const s=startOfDay(new Date(ev.start)),e=startOfDay(new Date(ev.end));for(let d=new Date(s);d<=e;d=addDays(d,1)){const k=toDateKey(d);(m[k]=m[k]||[]).push(ev);}});return m;},[events]);
  return (
    <div>
      <div className="gp-mhead">{WEEKDAYS.map((w)=><div key={w}>{w}</div>)}</div>
      <div className="gp-mgrid">
        {cells.map((d)=>{const k=toDateKey(d);const out=d.getMonth()!==cursor.getMonth();const list=(byDay[k]||[]).sort((a,b)=>new Date(a.start)-new Date(b.start));
          return (<div key={k} className={`gp-mcell ${out?"out":""} ${sameDay(d,new Date())?"today":""}`} onClick={()=>onDay(k)}>
            <span className="mday">{d.getDate()}</span>
            {list.slice(0,3).map((ev)=>{const bc=ev.buId&&buMap[ev.buId]?buMap[ev.buId].color:ev.color;
              return (<button key={ev.id+k} className={`gp-pill ${ev.done?"done":""}`} style={{background:hexToRgba(ev.color,0.16),color:ev.color}} onClick={(e)=>{e.stopPropagation();onEvent(ev);}}><span className="pdot" style={{background:bc}}/>{ev.title}</button>);})}
            {list.length>3&&<span className="gp-more">+{list.length-3} altri</span>}
          </div>);})}
      </div>
    </div>
  );
}

/* ---- Gantt ---- */
function GanttView({start,events,bus,buFilter,onNew,onEvent,onToggle}){
  const days=Array.from({length:GANTT_DAYS},(_,i)=>addDays(start,i));
  const rangeEnd=addDays(start,GANTT_DAYS);
  const today=startOfDay(new Date());
  const inRange=events.filter((ev)=>new Date(ev.end)>=start&&new Date(ev.start)<rangeEnd);

  const total=events.length, done=events.filter((e)=>e.done).length;
  const todo=total-done, late=events.filter((e)=>!e.done&&new Date(e.end)<today).length;

  const groups=[...bus.map((b)=>({id:b.id,name:b.name,color:b.color})),{id:null,name:"Senza BU",color:"#A89683"}]
    .map((g)=>({...g,items:inRange.filter((e)=>(e.buId||null)===g.id).sort((a,b)=>new Date(a.start)-new Date(b.start))}))
    .filter((g)=>g.items.length>0 || (buFilter!=="all" && (buFilter===NOBU?g.id===null:g.id===buFilter)));

  const nowLeft=daysBetween(start,new Date())*GANTT_COL + (new Date()-startOfDay(new Date()))/86400000*GANTT_COL;
  const showNow=nowLeft>=0&&nowLeft<=GANTT_DAYS*GANTT_COL;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <button className="gp-btn ghost sm" onClick={onNew}><Icon name="plus" size={15}/> Nuova attività</button>
      </div>
      <div className="gp-gantt-kpis">
        <div className="gp-kpi"><div className="klabel">Totali</div><div className="kval">{total}</div></div>
        <div className="gp-kpi done"><div className="klabel">Completati</div><div className="kval">{done}</div></div>
        <div className="gp-kpi"><div className="klabel">Da fare</div><div className="kval">{todo}</div></div>
        <div className="gp-kpi late"><div className="klabel">In ritardo</div><div className="kval">{late}</div></div>
      </div>
      <div className="gp-panel gp-gantt">
        <div className="gp-gantt-inner">
          <div className="gp-grow gp-ghead">
            <div className="gp-glabel">Attività</div>
            <div className="gp-gtrack">{days.map((d)=>{const we=(d.getDay()+6)%7>=5;const td=sameDay(d,new Date());
              return <div key={toDateKey(d)} className={`gp-gdh ${td?"today":""}`} style={we?{background:"#FBF6EC"}:{}}><span className="wd">{WEEKDAYS[(d.getDay()+6)%7]}</span><span className="dn">{d.getDate()}</span></div>;})}</div>
          </div>
          {groups.length===0 && <div className="gp-empty">Nessuna attività nel periodo. Creane una col pulsante “Nuovo”.</div>}
          {groups.map((g)=>(
            <div key={g.id||"nobu"}>
              <div className="gp-gbu"><span className="dot" style={{background:g.color}}/>{g.name}<span className="cnt">{g.items.length}</span></div>
              {g.items.map((ev)=>{
                const s=startOfDay(new Date(ev.start)), e=startOfDay(new Date(ev.end));
                const off=Math.max(0,daysBetween(start,s));
                const endIdx=Math.min(GANTT_DAYS-1,daysBetween(start,e));
                const span=Math.max(1,endIdx-off+1);
                const lateBar=!ev.done&&e<today;
                return (
                  <div key={ev.id} className="gp-grow">
                    <div className="gp-glabel">
                      <div className={`gp-check ${ev.done?"on":""}`} onClick={()=>onToggle(ev)}>{ev.done&&<Icon name="check" size={12} style={{color:"#fff"}}/>}</div>
                      <span className={`gp-gname ${ev.done?"done":""}`} title={ev.title}>{ev.title}</span>
                    </div>
                    <div className="gp-gtrack">
                      {days.map((d)=>{const we=(d.getDay()+6)%7>=5;return <div key={toDateKey(d)} className={`gp-gcell ${we?"we":""}`}/>;})}
                      {showNow&&<div className="gp-gnow" style={{left:nowLeft}}/>}
                      <div className="gp-gbar" style={{left:off*GANTT_COL+3,width:span*GANTT_COL-6,background:lateBar?"#9E4444":ev.color}} onClick={()=>onEvent(ev)}>
                        {ev.title}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---- Editor note formattate (stile Note) ---- */
function RichNote({value,onChange}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.innerHTML=value||"";},[]);
  const sync=()=>onChange(ref.current.innerHTML);
  const cmd=(c,v=null)=>{document.execCommand(c,false,v);ref.current.focus();sync();};
  const block=(tag)=>{document.execCommand("formatBlock",false,tag);ref.current.focus();sync();};
  const highlight=()=>{document.execCommand("hiliteColor",false,"#FCE6A8");ref.current.focus();sync();};
  const checklist=()=>{document.execCommand("insertHTML",false,'<ul class="gp-ck"><li>Nuova voce</li></ul>');ref.current.focus();sync();};
  const areaClick=(e)=>{
    const li=e.target.closest&&e.target.closest("ul.gp-ck > li");
    if(!li)return;const r=li.getBoundingClientRect();
    if(e.clientX-r.left<=24){li.classList.toggle("on");sync();}
  };
  const Btn=({c,label,style,title})=>(<button className="gp-rt-btn" title={title} style={style} onMouseDown={(e)=>{e.preventDefault();cmd(c);}}>{label}</button>);
  const Act=({fn,label,style,title,cls})=>(<button className={`gp-rt-btn ${cls||""}`} title={title} style={style} onMouseDown={(e)=>{e.preventDefault();fn();}}>{label}</button>);
  return (
    <div className="gp-rt">
      <div className="gp-rt-bar">
        <Act fn={()=>block("H2")} label="T" cls="wide" title="Titolo" style={{fontFamily:"'Fraunces',serif",fontWeight:600,fontSize:16}}/>
        <Act fn={()=>block("H3")} label="t" cls="wide" title="Sottotitolo" style={{fontWeight:800,fontSize:14}}/>
        <Act fn={()=>block("P")} label="¶" title="Testo normale"/>
        <span className="gp-rt-div"/>
        <Btn c="bold" label="B" title="Grassetto" style={{fontWeight:800}}/>
        <Btn c="italic" label="I" title="Corsivo" style={{fontStyle:"italic"}}/>
        <Btn c="underline" label="U" title="Sottolineato" style={{textDecoration:"underline"}}/>
        <Btn c="strikeThrough" label="S" title="Barrato" style={{textDecoration:"line-through"}}/>
        <Act fn={highlight} label="H" title="Evidenzia" style={{background:"#FCE6A8",fontWeight:800}}/>
        <span className="gp-rt-div"/>
        <Act fn={checklist} label={<Icon name="check" size={15}/>} title="Checklist"/>
        <Btn c="insertUnorderedList" label={<Icon name="list" size={15}/>} title="Elenco puntato"/>
        <Btn c="insertOrderedList" label={<Icon name="listord" size={15}/>} title="Elenco numerato"/>
        <span className="gp-rt-div"/>
        <Btn c="removeFormat" label="⌫" title="Pulisci formattazione"/>
      </div>
      <div className="gp-rt-area" ref={ref} contentEditable onInput={sync} onClick={areaClick} suppressContentEditableWarning={true}/>
    </div>
  );
}

/* ---- Ricorrenza (inserimento massivo) ---- */
function Recurrence({draft,set}){
  const opts=[["none","Mai"],["daily","Ogni giorno"],["weekly","Ogni settimana"],["custom","Giorni scelti"]];
  const rep=draft.repeat||"none";
  const on={borderColor:"#C75D3A",background:"rgba(199,93,58,.12)",color:"#3A2E26"};
  const setRep=(v)=>{const p={repeat:v};if(v!=="none"&&!draft.repeatUntil)p.repeatUntil=toDateKey(addDays(fromDateKey(draft.startDate),30));set(p);};
  const toggleDay=(i)=>{const arr=draft.repeatDays||[];set({repeatDays:arr.includes(i)?arr.filter((x)=>x!==i):[...arr,i]});};
  return (
    <div style={{marginTop:8}}>
      <label className="gp-lbl">Ripeti su più date</label>
      <div className="gp-chips">{opts.map(([v,l])=>(<button key={v} className={`gp-chip ${rep===v?"on":""}`} style={rep===v?on:{}} onClick={()=>setRep(v)}>{l}</button>))}</div>
      {rep==="custom" && (<><label className="gp-lbl">Giorni della settimana</label><div className="gp-chips">{WEEKDAYS.map((w,i)=>(<button key={w} className={`gp-chip ${(draft.repeatDays||[]).includes(i)?"on":""}`} style={(draft.repeatDays||[]).includes(i)?on:{}} onClick={()=>toggleDay(i)}>{w}</button>))}</div></>)}
      {rep!=="none" && (<><label className="gp-lbl">Fino al</label><input className="gp-input" type="date" value={draft.repeatUntil||""} onChange={(e)=>set({repeatUntil:e.target.value})}/></>)}
    </div>
  );
}

/* ---- Priorità · board settimanale con drag & drop ---- */
const PRI_LEVELS=[
  {key:"top3",name:"Top 3 della giornata",color:"#C75D3A",cap:3},
  {key:"high",name:"Priorità alta",color:"#9E4444"},
  {key:"mid",name:"Priorità media",color:"#D9A441"},
  {key:"low",name:"Priorità bassa",color:"#7E9B6E"},
];
function PriorityView({events,bus,buMap,onEvent,onToggle,onReorder,onSetLevel,onMoveDay}){
  const [weekStart,setWeekStart]=useState(()=>startOfWeek(new Date()));
  const [selKey,setSelKey]=useState(()=>toDateKey(new Date()));
  const [drag,setDrag]=useState(null);            // {ev,x,y,over}
  const [menuEv,setMenuEv]=useState(null);        // task su cui aprire il menù a tocco
  const dragRef=useRef(null), overRef=useRef(null), justDragRef=useRef(false);
  const today=startOfDay(new Date());
  const weekDays=Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const selDay=fromDateKey(selKey);

  // mantieni il giorno selezionato dentro la settimana mostrata
  useEffect(()=>{const inWeek=weekDays.some((d)=>toDateKey(d)===selKey);if(!inWeek)setSelKey(toDateKey(weekDays[0]));},[weekStart]);

  const onDay=(d)=>{const ws=startOfDay(d),we=addDays(ws,1);return events.filter((ev)=>ev.inGantt!==false&&new Date(ev.end)>ws&&new Date(ev.start)<we);};
  const selEvents=onDay(selDay).sort((a,b)=>{const pa=a.priority??9999,pb=b.priority??9999;return pa-pb||new Date(a.start)-new Date(b.start);});
  const overdue=events.filter((ev)=>ev.inGantt!==false&&!ev.done&&startOfDay(new Date(ev.end))<today)
    .sort((a,b)=>new Date(a.end)-new Date(b.end));
  const bucket=(k)=>selEvents.filter((e)=>(e.priorityLevel||null)===k);
  const pool=selEvents.filter((e)=>!e.priorityLevel);
  const countFor=(d)=>onDay(d).filter((e)=>!e.done).length;

  /* ---- drag SOLO da mouse/desktop (su touch si usa il tap → menù) ---- */
  const findDrop=(x,y)=>{const el=document.elementFromPoint(x,y);const z=el&&el.closest&&el.closest("[data-drop]");return z?z.getAttribute("data-drop"):null;};
  const endDrag=()=>{
    window.removeEventListener("pointermove",onPointerMove);
    window.removeEventListener("pointerup",onPointerUp);
    window.removeEventListener("pointercancel",onPointerCancel);
  };
  const onPointerDown=(e,ev)=>{
    if(e.pointerType&&e.pointerType!=="mouse")return; // touch/penna: lascia gestire al click nativo
    if(e.button!==undefined&&e.button!==0)return;
    dragRef.current={ev,sx:e.clientX,sy:e.clientY,moved:false};
    window.addEventListener("pointermove",onPointerMove,{passive:false});
    window.addEventListener("pointerup",onPointerUp);
    window.addEventListener("pointercancel",onPointerCancel);
  };
  const onPointerMove=(e)=>{
    const d=dragRef.current;if(!d)return;
    if(!d.moved){if(Math.abs(e.clientX-d.sx)<6&&Math.abs(e.clientY-d.sy)<6)return;d.moved=true;}
    if(e.cancelable)e.preventDefault();
    const over=findDrop(e.clientX,e.clientY);overRef.current=over;
    setDrag({ev:d.ev,x:e.clientX,y:e.clientY,over});
  };
  const onPointerUp=()=>{
    endDrag();const d=dragRef.current;dragRef.current=null;
    if(d&&d.moved){const over=overRef.current;if(over)handleDrop(d.ev,over);justDragRef.current=true;setTimeout(()=>{justDragRef.current=false;},350);}
    overRef.current=null;setDrag(null);
  };
  const onPointerCancel=()=>{endDrag();dragRef.current=null;overRef.current=null;setDrag(null);};
  const handleDrop=(ev,key)=>{
    const evDay=toDateKey(startOfDay(new Date(ev.start)));
    if(key.startsWith("bucket:")){
      const lvl=key.slice(7);
      if(evDay!==selKey)onMoveDay(ev,selKey,lvl);else onSetLevel(ev.id,lvl);
    }else if(key.startsWith("day:")){
      const dk=key.slice(4);if(dk!==evDay)onMoveDay(ev,dk);setSelKey(dk);
    }else if(key==="pool"){
      if(evDay!==selKey)onMoveDay(ev,selKey,null);else onSetLevel(ev.id,null);
    }
  };

  const moveInBucket=(arr,i,dir)=>{const j=i+dir;if(j<0||j>=arr.length)return;const a=[...arr];const t=a[i];a[i]=a[j];a[j]=t;onReorder(a.map((x)=>x.id));};

  /* ---- menù a tocco (senza trascinare) ---- */
  const applyLevel=(ev,lvl)=>{const evDay=toDateKey(startOfDay(new Date(ev.start)));if(evDay!==selKey)onMoveDay(ev,selKey,lvl);else onSetLevel(ev.id,lvl);setMenuEv(null);};
  const applyDay=(ev,dk)=>{const evDay=toDateKey(startOfDay(new Date(ev.start)));if(dk!==evDay)onMoveDay(ev,dk);setSelKey(dk);setMenuEv(null);};

  const Chip=({ev,idx,arr,bucketKey})=>{
    const bu=ev.buId&&buMap[ev.buId]?buMap[ev.buId]:null;const s=new Date(ev.start);
    return (
      <div className={`gp-pchip ${ev.done?"done":""}`} onPointerDown={(e)=>onPointerDown(e,ev)} onClick={()=>{if(justDragRef.current)return;setMenuEv(ev);}} title="Tocca per scegliere dove metterla (o trascina col mouse)">
        <div className={`gp-check ${ev.done?"on":""}`} onPointerDown={(e)=>e.stopPropagation()} onClick={(e)=>{e.stopPropagation();onToggle(ev);}}>{ev.done&&<Icon name="check" size={11} style={{color:"#fff"}}/>}</div>
        <span className="pdot" style={{background:ev.color}}/>
        <div className="pbody">
          <span className="pttl">{ev.title}</span>
          <span className="pmeta">{timeStr(s)}{bu&&<span className="pbu" style={{background:bu.color}}>{bu.name}</span>}</span>
        </div>
        <div className="gp-pmini" onPointerDown={(e)=>e.stopPropagation()}>
          {bucketKey&&<>
            <button disabled={idx===0} title="Su" onClick={(e)=>{e.stopPropagation();moveInBucket(arr,idx,-1);}}><Icon name="up" size={13}/></button>
            <button disabled={idx===arr.length-1} title="Giù" onClick={(e)=>{e.stopPropagation();moveInBucket(arr,idx,1);}}><Icon name="down" size={13}/></button>
          </>}
          <button className="accent" title="Assegna / sposta" onClick={(e)=>{e.stopPropagation();setMenuEv(ev);}}><Icon name="move" size={14}/></button>
        </div>
      </div>
    );
  };

  const selLabel=`${WEEKDAYS[(selDay.getDay()+6)%7]} ${selDay.getDate()} ${MONTHS[selDay.getMonth()]}`;
  const wkEnd=addDays(weekStart,6);
  const wkLabel=weekStart.getMonth()===wkEnd.getMonth()
    ? `${weekStart.getDate()}–${wkEnd.getDate()} ${MONTHS[weekStart.getMonth()].slice(0,3)}`
    : `${weekStart.getDate()} ${MONTHS[weekStart.getMonth()].slice(0,3)} – ${wkEnd.getDate()} ${MONTHS[wkEnd.getMonth()].slice(0,3)}`;

  return (
    <div className="gp-panel" style={{padding:"16px"}}>
      <div className="gp-pw-head">
        <span className="gp-pw-title">Settimana</span>
        <div className="gp-nav">
          <button onClick={()=>setWeekStart((w)=>addDays(w,-7))}><Icon name="left"/></button>
          <button className="today" onClick={()=>{setWeekStart(startOfWeek(new Date()));setSelKey(toDateKey(new Date()));}}>Questa settimana</button>
          <button onClick={()=>setWeekStart((w)=>addDays(w,7))}><Icon name="right"/></button>
        </div>
        <span style={{fontWeight:800,color:"#8A7A6D",fontSize:13}}>{wkLabel}</span>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,background:"#FFF6ED",border:"1px solid #EAD7C2",borderRadius:12,padding:"9px 12px",fontSize:12.5,fontWeight:700,color:"#8A6A50",marginBottom:14,lineHeight:1.45}}>
        <Icon name="move" size={16} style={{flexShrink:0,color:"#C75D3A"}}/>
        <span>Per assegnare una priorità <b>tocca un'attività</b>: si apre un menù dove scegli il riquadro o il giorno dove metterla. Da computer puoi anche <b>trascinarla</b> col mouse.</span>
      </div>

      <div className="gp-daychips">
        {weekDays.map((d)=>{const k=toDateKey(d);const c=countFor(d);const isOver=drag&&drag.over===`day:${k}`;
          return (<button key={k} data-drop={`day:${k}`} className={`gp-daychip ${k===selKey?"on":""} ${sameDay(d,new Date())?"today":""} ${isOver?"is-drop":""}`} onClick={()=>setSelKey(k)}>
            <span className="wd">{WEEKDAYS[(d.getDay()+6)%7]}</span>
            <span className="dn">{d.getDate()}</span>
            <span className="cb">{c>0?`${c} att.`:""}</span>
          </button>);})}
      </div>

      {overdue.length>0 && (
        <div className={`gp-late ${drag&&drag.over==="pool"?"":""}`}>
          <div className="gp-late-h"><Icon name="flag" size={15}/> In ritardo<span className="badge">{overdue.length}</span></div>
          <div className="gp-late-hint">Tocca un'attività e scegli il giorno (o trascinala su un giorno qui sopra) per riprogrammarla.</div>
          <div className="gp-late-list">
            {overdue.map((ev)=>{const e=new Date(ev.end);
              return (<div key={ev.id} className="gp-late-chip" onPointerDown={(e2)=>onPointerDown(e2,ev)} onClick={()=>{if(justDragRef.current)return;setMenuEv(ev);}} title="Tocca per scegliere il giorno (o trascina col mouse)">
                <span className="pdot" style={{background:ev.color}}/>{ev.title}
                <span className="od">scad. {e.getDate()} {MONTHS[e.getMonth()].slice(0,3)}</span>
                <button className="lc-btn" onPointerDown={(e2)=>e2.stopPropagation()} onClick={(e2)=>{e2.stopPropagation();setMenuEv(ev);}} title="Assegna / sposta"><Icon name="move" size={13}/></button>
              </div>);})}
          </div>
        </div>
      )}

      <div style={{fontWeight:800,color:"#5A4A3D",fontSize:14,margin:"2px 0 12px"}}>Riquadri di <span style={{color:"#C75D3A"}}>{selLabel}</span></div>

      <div className="gp-buckets">
        {PRI_LEVELS.map((L)=>{const items=bucket(L.key);const over=drag&&drag.over===`bucket:${L.key}`;const capOver=L.cap&&items.length>L.cap;
          return (
            <div key={L.key} className={`gp-bucket ${over?"is-drop":""}`} style={{"--bk":L.color}} data-drop={`bucket:${L.key}`}>
              <div className="gp-bucket-h">
                <span className="gp-bucket-dot" style={{background:L.color}}/>
                <span className="gp-bucket-name">{L.name}</span>
                <span className={`gp-bucket-cnt ${capOver?"over":""}`}>{L.cap?`${items.length}/${L.cap}`:items.length}</span>
              </div>
              <div className="gp-bucket-body">
                {items.length===0
                  ? <div className="gp-bucket-empty">Trascina o tocca un'attività e scegli «{L.name}»</div>
                  : items.map((ev,i)=><Chip key={ev.id} ev={ev} idx={i} arr={items} bucketKey={L.key}/>)}
              </div>
            </div>
          );})}
      </div>

      <div className={`gp-pool ${drag&&drag.over==="pool"?"is-drop":""}`} data-drop="pool">
        <div className="gp-pool-h"><Icon name="list" size={15}/> Da assegnare — {selLabel}<span className="badge">{pool.length}</span></div>
        {pool.length===0
          ? <div className="gp-bucket-empty" style={{borderColor:"#D8C7AC"}}>Tutte le attività di questo giorno hanno una priorità 🎉</div>
          : <div className="gp-pool-list">{pool.map((ev)=><Chip key={ev.id} ev={ev}/>)}</div>}
      </div>

      {drag && <div className="gp-drag-ghost" style={{left:drag.x+14,top:drag.y+14}}>
        <span className="dot" style={{background:drag.ev.color}}/><span className="t">{drag.ev.title}</span>
      </div>}

      {menuEv && <AssignSheet ev={menuEv} selKey={selKey} selLabel={selLabel} weekDays={weekDays}
        onLevel={(l)=>applyLevel(menuEv,l)} onDay={(dk)=>applyDay(menuEv,dk)}
        onOpen={()=>{const e=menuEv;setMenuEv(null);onEvent(e);}} onClose={()=>setMenuEv(null)}/>}
    </div>
  );
}

/* ---- Menù a tocco: assegna priorità / sposta giorno ---- */
function AssignSheet({ev,selKey,selLabel,weekDays,onLevel,onDay,onOpen,onClose}){
  const cur=ev.priorityLevel||null;
  const evDay=toDateKey(startOfDay(new Date(ev.start)));
  return (
    <div className="gp-sheet-ov" onClick={onClose}>
      <div className="gp-sheet" onClick={(e)=>e.stopPropagation()}>
        <div className="gp-sheet-h">
          <span className="pdot" style={{background:ev.color}}/>
          <span className="nm">{ev.title}</span>
          <button className="gp-icon" onClick={onClose}><Icon name="x"/></button>
        </div>
        <div className="gp-sheet-sub">Priorità per {selLabel}</div>
        <div className="gp-lvlgrid">
          {PRI_LEVELS.map((L)=>(
            <button key={L.key} className={`gp-lvlbtn ${cur===L.key&&evDay===selKey?"on":""}`} style={{"--bk":L.color}} onClick={()=>onLevel(L.key)}>
              <span className="d" style={{background:L.color}}/>{L.name}
            </button>
          ))}
          <button className="gp-lvlbtn" style={{gridColumn:"1 / -1",justifyContent:"center"}} onClick={()=>onLevel(null)}>
            <Icon name="x" size={14}/> Togli priorità (Da assegnare)
          </button>
        </div>
        <div className="gp-sheet-sub">Sposta a un altro giorno</div>
        <div className="gp-sheet-days">
          {weekDays.map((d)=>{const k=toDateKey(d);
            return (<button key={k} className={`gp-daychip ${k===evDay?"on":""} ${sameDay(d,new Date())?"today":""}`} onClick={()=>onDay(k)}>
              <span className="wd">{WEEKDAYS[(d.getDay()+6)%7]}</span><span className="dn">{d.getDate()}</span>
            </button>);})}
        </div>
        <button className="gp-btn ghost block" style={{marginTop:14}} onClick={onOpen}><Icon name="pencil" size={15}/> Apri scheda completa</button>
      </div>
    </div>
  );
}

/* ---- Promemoria ---- */
function ReminderView({reminders,onAdd,onUpdate,onDelete}){
  const [text,setText]=useState(""),[due,setDue]=useState(""),[editId,setEditId]=useState(null),[editText,setEditText]=useState("");
  const today=toDateKey(new Date());
  const add=()=>{if(!text.trim())return;onAdd(text.trim(),due);setText("");setDue("");};
  const todo=reminders.filter((r)=>!r.done).sort((a,b)=>{if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due);});
  const done=reminders.filter((r)=>r.done).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const saveEdit=(r)=>{if(editText.trim()&&editText.trim()!==r.text)onUpdate(r.id,{text:editText.trim()});setEditId(null);};
  const dueBadge=(r)=>{if(!r.due)return null;const d=fromDateKey(r.due);let cls="",lbl=`${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
    if(!r.done&&r.due<today){cls="late";lbl="Scaduto · "+lbl;}else if(!r.done&&r.due===today){cls="today";lbl="Oggi";}
    return <span className={`gp-rdue ${cls}`}>{lbl}</span>;};
  const Row=(r)=>(
    <div key={r.id} className="gp-rrow">
      <div className={`gp-check ${r.done?"on":""}`} onClick={()=>onUpdate(r.id,{done:!r.done})}>{r.done&&<Icon name="check" size={12} style={{color:"#fff"}}/>}</div>
      {editId===r.id
        ? <input className="gp-input" autoFocus value={editText} onChange={(e)=>setEditText(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&saveEdit(r)} onBlur={()=>saveEdit(r)}/>
        : <span className={`gp-rtext ${r.done?"done":""}`} onClick={()=>{setEditId(r.id);setEditText(r.text);}}>{r.text}</span>}
      {dueBadge(r)}
      <button className="gp-icon sm danger" onClick={()=>onDelete(r.id)}><Icon name="trash" size={15}/></button>
    </div>
  );
  return (
    <div className="gp-panel" style={{padding:"16px"}}>
      <div className="gp-radd">
        <input className="gp-input" placeholder="Aggiungi un promemoria…" value={text} onChange={(e)=>setText(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&add()}/>
        <input className="gp-input gp-rdate" type="date" value={due} onChange={(e)=>setDue(e.target.value)}/>
        <button className="gp-btn solid" onClick={add}><Icon name="plus" size={16}/> Aggiungi</button>
      </div>
      {todo.length===0&&done.length===0&&<div className="gp-empty">Nessun promemoria. Scrivine uno qui sopra.</div>}
      <div className="gp-rlist">{todo.map(Row)}</div>
      {done.length>0&&<><div className="gp-rsep">Completati ({done.length})</div><div className="gp-rlist">{done.map(Row)}</div></>}
    </div>
  );
}

/* ---- Archivio completate ---- */
function ArchiveView({events,buMap,onEvent,onToggle,onDelete}){
  const sorted=[...events].sort((a,b)=>new Date(b.end)-new Date(a.end));
  if(sorted.length===0) return <div className="gp-panel"><div className="gp-empty">Nessuna attività completata. Spunta un'attività come fatta per ritrovarla qui.</div></div>;
  const groups=[];
  sorted.forEach((ev)=>{const d=new Date(ev.end);const key=`${d.getFullYear()}-${d.getMonth()}`;let g=groups.find((x)=>x.key===key);if(!g){g={key,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,items:[]};groups.push(g);}g.items.push(ev);});
  return (
    <div className="gp-panel" style={{padding:"6px 0 12px"}}>
      {groups.map((g)=>(
        <div key={g.key}>
          <div className="gp-arch-month">{g.label} · {g.items.length}</div>
          {g.items.map((ev)=>{const d=new Date(ev.end);const bu=ev.buId&&buMap[ev.buId]?buMap[ev.buId]:null;
            return (<div key={ev.id} className="gp-arch-row">
              <div className="gp-check on" title="Riapri (segna da fare)" onClick={()=>onToggle(ev)}><Icon name="check" size={12} style={{color:"#fff"}}/></div>
              <button className="gp-arch-main" onClick={()=>onEvent(ev)}>
                <span className="pdot" style={{background:ev.color}}/>
                <span className="gp-arch-title">{ev.title}</span>
                {bu&&<span className="gp-arch-bu" style={{background:bu.color}}>{bu.name}</span>}
                <span className="gp-arch-date">{d.getDate()} {MONTHS[d.getMonth()].slice(0,3)}</span>
              </button>
              <button className="gp-icon sm danger" onClick={()=>onDelete(ev.id)}><Icon name="trash" size={15}/></button>
            </div>);})}
        </div>
      ))}
    </div>
  );
}

/* ---- Drawer gestione (Attività + BU) ---- */
function ManageDrawer({tab,setTab,activities,bus,buMap,onClose,onUpsertAct,onRemoveAct,onSeedAct,onUpsertBu,onRemoveBu,onSeedBu,onUse}){
  const [draft,setDraft]=useState(null);
  const newAct=()=>setDraft({kind:"act",id:null,name:"",color:PALETTE[0],dur:60,buId:null});
  const newBu=()=>setDraft({kind:"bu",id:null,name:"",color:PALETTE[2]});
  const switchTab=(t)=>{setTab(t);setDraft(null);};
  return (
    <div className="gp-overlay" onClick={onClose}>
      <aside className="gp-drawer" onClick={(e)=>e.stopPropagation()}>
        <div className="gp-drawer-head"><h2><Icon name="settings" size={18}/> Gestione</h2><button className="gp-icon" onClick={onClose}><Icon name="x"/></button></div>
        <div className="gp-tabs">
          <button className={tab==="activities"?"on":""} onClick={()=>switchTab("activities")}>Attività</button>
          <button className={tab==="bu"?"on":""} onClick={()=>switchTab("bu")}>Business Unit</button>
        </div>

        {tab==="activities" && (<>
          <p className="gp-hint">Le attività ricorrenti: toccale per inserirle nel calendario. Puoi assegnarle a una BU.</p>
          <div className="gp-actlist">
            {activities.map((a)=>(<div key={a.id} className="gp-actrow">
              <button className="gp-actmain" onClick={()=>onUse(a)}>
                <span className="dot" style={{background:a.color}}/><span className="nm">{a.name}</span>
                {a.buId&&buMap[a.buId]&&<span className="bu" style={{background:buMap[a.buId].color}}>{buMap[a.buId].name}</span>}
                <span className="du">{Math.floor(a.dur/60)}h{a.dur%60?` ${a.dur%60}m`:""}</span>
              </button>
              <button className="gp-icon sm" onClick={()=>setDraft({kind:"act",...a,buId:a.buId||null})}><Icon name="pencil" size={15}/></button>
              <button className="gp-icon sm danger" onClick={()=>onRemoveAct(a.id)}><Icon name="trash" size={15}/></button>
            </div>))}
            {activities.length===0&&!draft&&<button className="gp-add" onClick={onSeedAct}><Icon name="plus" size={16}/> Carica attività di esempio</button>}
          </div>
          {draft&&draft.kind==="act"?(
            <div className="gp-editcard">
              <input className="gp-input" placeholder="Nome attività" autoFocus value={draft.name} onChange={(e)=>setDraft({...draft,name:e.target.value})}/>
              <label className="gp-lbl">Durata predefinita (minuti)</label>
              <input className="gp-input" type="number" min="5" step="5" value={draft.dur} onChange={(e)=>setDraft({...draft,dur:Number(e.target.value)||0})}/>
              <label className="gp-lbl">Business Unit</label>
              <select className="gp-select" style={{width:"100%"}} value={draft.buId||""} onChange={(e)=>setDraft({...draft,buId:e.target.value||null})}>
                <option value="">Nessuna</option>{bus.map((b)=><option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
              <label className="gp-lbl">Colore</label>
              <Swatches value={draft.color} onPick={(c)=>setDraft({...draft,color:c})}/>
              <div className="gp-editactions"><button className="gp-btn ghost sm" onClick={()=>setDraft(null)}>Annulla</button><button className="gp-btn solid sm" disabled={!draft.name.trim()} onClick={()=>{onUpsertAct(draft);setDraft(null);}}><Icon name="check" size={15}/> Salva</button></div>
            </div>
          ):<button className="gp-add" onClick={newAct}><Icon name="plus" size={16}/> Nuova attività</button>}
        </>)}

        {tab==="bu" && (<>
          <p className="gp-hint">Le Business Unit raggruppano le tue attività (es. TDP, Personal, Lavoro). Crea, rinomina ed elimina liberamente.</p>
          <div className="gp-actlist">
            {bus.map((b)=>(<div key={b.id} className="gp-actrow">
              <div className="gp-actmain" style={{cursor:"default"}}><span className="dot" style={{background:b.color}}/><span className="nm">{b.name}</span></div>
              <button className="gp-icon sm" onClick={()=>setDraft({kind:"bu",...b})}><Icon name="pencil" size={15}/></button>
              <button className="gp-icon sm danger" onClick={()=>onRemoveBu(b.id)}><Icon name="trash" size={15}/></button>
            </div>))}
            {bus.length===0&&!draft&&<button className="gp-add" onClick={onSeedBu}><Icon name="plus" size={16}/> Carica BU di esempio</button>}
          </div>
          {draft&&draft.kind==="bu"?(
            <div className="gp-editcard">
              <input className="gp-input" placeholder="Nome BU (es. TDP)" autoFocus value={draft.name} onChange={(e)=>setDraft({...draft,name:e.target.value})}/>
              <label className="gp-lbl">Colore</label>
              <Swatches value={draft.color} onPick={(c)=>setDraft({...draft,color:c})}/>
              <div className="gp-editactions"><button className="gp-btn ghost sm" onClick={()=>setDraft(null)}>Annulla</button><button className="gp-btn solid sm" disabled={!draft.name.trim()} onClick={()=>{onUpsertBu(draft);setDraft(null);}}><Icon name="check" size={15}/> Salva</button></div>
            </div>
          ):<button className="gp-add" onClick={newBu}><Icon name="plus" size={16}/> Nuova Business Unit</button>}
        </>)}
      </aside>
    </div>
  );
}

/* ---- Modal evento ---- */
function EventModal({draft,activities,bus,onChange,onClose,onSave,onDelete}){
  const set=(p)=>onChange({...draft,...p});
  const multiDay=draft.startDate!==draft.endDate;
  return (
    <div className="gp-overlay center" onClick={onClose}>
      <div className="gp-modal" onClick={(e)=>e.stopPropagation()}>
        <div className="gp-modal-head"><h2>{draft._isNew?"Nuovo impegno":"Modifica impegno"}</h2><button className="gp-icon" onClick={onClose}><Icon name="x"/></button></div>
        <div className="gp-modal-body">
          {activities.length>0&&(<><label className="gp-lbl">Da libreria</label><div className="gp-chips">
            {activities.map((a)=>(<button key={a.id} className={`gp-chip ${draft.activityId===a.id?"on":""}`} style={draft.activityId===a.id?{borderColor:a.color,background:hexToRgba(a.color,0.12)}:{}} onClick={()=>set({activityId:a.id,title:a.name,color:a.color,buId:a.buId||draft.buId})}><span className="dot" style={{background:a.color}}/> {a.name}</button>))}
            <button className={`gp-chip ${!draft.activityId?"on":""}`} onClick={()=>set({activityId:null})}>Personalizzato</button>
          </div></>)}
          <label className="gp-lbl">Titolo</label>
          <input className="gp-input" placeholder="Es. Riunione, Allenamento…" value={draft.title} onChange={(e)=>set({title:e.target.value,activityId:null})}/>
          <label className="gp-lbl">Business Unit</label>
          <div className="gp-chips">
            {bus.map((b)=>(<button key={b.id} className={`gp-chip ${draft.buId===b.id?"on":""}`} style={draft.buId===b.id?{borderColor:b.color,background:hexToRgba(b.color,0.12)}:{}} onClick={()=>set({buId:b.id})}><span className="dot" style={{background:b.color}}/> {b.name}</button>))}
            <button className={`gp-chip ${!draft.buId?"on":""}`} onClick={()=>set({buId:null})}>Nessuna</button>
          </div>
          <div className="gp-row2">
            <div><label className="gp-lbl">Inizio</label><div className="gp-datetime"><input className="gp-input" type="date" value={draft.startDate} onChange={(e)=>set({startDate:e.target.value,endDate:multiDay?draft.endDate:e.target.value})}/><input className="gp-input" type="time" value={draft.startTime} onChange={(e)=>set({startTime:e.target.value})}/></div></div>
            <div><label className="gp-lbl">Fine / Scadenza</label><div className="gp-datetime"><input className="gp-input" type="date" value={draft.endDate} onChange={(e)=>set({endDate:e.target.value})}/><input className="gp-input" type="time" value={draft.endTime} onChange={(e)=>set({endTime:e.target.value})}/></div></div>
          </div>
          <label className="gp-lbl">Colore</label>
          <Swatches value={draft.color} onPick={(c)=>set({color:c})}/>
          <div className={`gp-toggle ${draft.done?"on":""}`} onClick={()=>set({done:!draft.done})}><div className="sw"/><span className="txt">{draft.done?"Completata":"Da fare"}</span></div>
          <label className="gp-lbl">Dove farla comparire</label>
          <div className={`gp-toggle ${draft.inCalendar!==false?"on":""}`} onClick={()=>set({inCalendar:draft.inCalendar===false})}><div className="sw"/><span className="txt">Nel calendario (Giorno · Settimana · Mese)</span></div>
          <div className={`gp-toggle ${draft.inGantt!==false?"on":""}`} onClick={()=>set({inGantt:draft.inGantt===false})}><div className="sw"/><span className="txt">Nel Gantt</span></div>
          <label className="gp-lbl"><Icon name="note" size={13} style={{marginRight:5}}/>Note</label>
          <RichNote key={draft.id||"new"} value={draft.note} onChange={(v)=>set({note:v})}/>
          {draft._isNew && <Recurrence draft={draft} set={set}/>}
        </div>
        <div className="gp-modal-foot">
          {!draft._isNew?<button className="gp-btn ghost danger" onClick={()=>onDelete(draft.id)}><Icon name="trash" size={15}/> Elimina</button>:<span/>}
          <div className="gp-foot-right"><button className="gp-btn ghost" onClick={onClose}>Annulla</button><button className="gp-btn solid" onClick={()=>onSave(draft)}><Icon name="check" size={16}/> Salva</button></div>
        </div>
      </div>
    </div>
  );
}

function Swatches({value,onPick}){return (<div className="gp-swatches">{PALETTE.map((c)=>(<button key={c} className={`gp-sw ${value===c?"on":""}`} style={{background:c}} onClick={()=>onPick(c)}>{value===c&&<Icon name="check" size={13} style={{color:"#fff"}}/>}</button>))}</div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
