<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Giornata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- React + Babel (no build step) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{background:#F4ECDF;color:#3A2E26;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}

  .gp-center{height:100%;display:flex;align-items:center;justify-content:center;color:#8A7A6D;font-size:15px}
  .gp-shell{min-height:100%;display:flex;flex-direction:column;background:#F4ECDF}

  /* ---------- LOGIN ---------- */
  .gp-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 70% -10%,#FBEFE0 0%,#F4ECDF 55%)}
  .gp-card{width:min(400px,100%);background:#FFFDF8;border:1px solid #E4D7C2;border-radius:22px;
    padding:34px 30px;box-shadow:0 20px 60px rgba(90,74,61,.12)}
  .gp-card .logo{width:56px;height:56px;border-radius:17px;display:grid;place-items:center;color:#FFF8EC;
    font-family:'Fraunces',serif;font-weight:600;font-size:32px;margin-bottom:18px;
    background:linear-gradient(140deg,#C75D3A,#A8552E);box-shadow:0 6px 18px rgba(199,93,58,.32)}
  .gp-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:28px;letter-spacing:-.4px}
  .gp-card .lead{color:#8A7A6D;font-size:14px;font-weight:600;margin:6px 0 22px}
  .gp-err{background:#F8E9E9;color:#9E4444;border:1px solid #E8C9C9;border-radius:10px;
    padding:9px 12px;font-size:13px;font-weight:700;margin-bottom:14px}
  .gp-switch{margin-top:16px;font-size:13px;color:#8A7A6D;font-weight:600;text-align:center}
  .gp-switch button{background:none;border:none;color:#C75D3A;font-weight:800;cursor:pointer;font-size:13px}

  /* ---------- HEADER ---------- */
  .gp-header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;
    flex-wrap:wrap;padding:14px 20px;background:rgba(247,241,232,.92);backdrop-filter:blur(10px);border-bottom:1px solid #E4D7C2}
  .gp-brand{display:flex;align-items:center;gap:12px}
  .gp-logo{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;color:#FFF8EC;
    font-family:'Fraunces',serif;font-weight:600;font-size:24px;
    background:linear-gradient(140deg,#C75D3A,#A8552E);box-shadow:0 4px 14px rgba(199,93,58,.3)}
  .gp-title{font-family:'Fraunces',serif;font-weight:600;font-size:24px;letter-spacing:-.3px;line-height:1}
  .gp-sub{font-size:13px;color:#8A7A6D;font-weight:600;margin-top:3px}
  .gp-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  .gp-seg{display:flex;background:#EADFCB;border-radius:11px;padding:3px}
  .gp-seg button{display:flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;
    padding:7px 12px;border-radius:8px;font-size:13px;font-weight:700;color:#8A7A6D;transition:.18s;font-family:inherit}
  .gp-seg button.on{background:#FFFDF8;color:#3A2E26;box-shadow:0 1px 4px rgba(0,0,0,.08)}

  .gp-nav{display:flex;align-items:center;gap:4px}
  .gp-nav button{border:1px solid #E4D7C2;background:#FFFDF8;cursor:pointer;height:34px;min-width:34px;
    border-radius:9px;display:grid;place-items:center;color:#5A4A3D;font-weight:700;font-size:13px;transition:.15s;font-family:inherit}
  .gp-nav button:hover{background:#F4ECDF}
  .gp-nav .today{padding:0 12px}

  .gp-btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;cursor:pointer;font-weight:700;
    font-size:13px;padding:9px 14px;border:1px solid transparent;transition:.15s;font-family:inherit}
  .gp-btn.solid{background:#C75D3A;color:#FFF8EC;box-shadow:0 3px 10px rgba(199,93,58,.28)}
  .gp-btn.solid:hover{background:#B5502F}
  .gp-btn.ghost{background:#FFFDF8;border-color:#E4D7C2;color:#5A4A3D}
  .gp-btn.ghost:hover{background:#F4ECDF}
  .gp-btn.ghost.danger{color:#9E4444;border-color:#E8C9C9}
  .gp-btn.ghost.danger:hover{background:#F8E9E9}
  .gp-btn.sm{padding:7px 12px;font-size:12.5px}
  .gp-btn.block{width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:6px}
  .gp-btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- CALENDARIO ---------- */
  .gp-cal-wrap{flex:1;padding:16px 20px 24px;min-height:0}
  .gp-cal{height:calc(100vh - 150px);min-height:420px;overflow:auto;background:#FFFDF8;border:1px solid #E4D7C2;
    border-radius:16px;box-shadow:0 8px 30px rgba(90,74,61,.06)}
  .gp-weekhead{position:sticky;top:0;z-index:12;display:grid;background:#FFFDF8;border-bottom:1px solid #EADFCB}
  .gp-wh{padding:9px 4px;text-align:center;border-left:1px solid #F0E7D6}
  .gp-wh .wd{display:block;font-size:11px;font-weight:700;color:#8A7A6D;text-transform:uppercase;letter-spacing:.5px}
  .gp-wh .dn{display:inline-grid;place-items:center;width:26px;height:26px;margin-top:3px;font-size:14px;font-weight:800;border-radius:50%}
  .gp-wh.today .dn{background:#C75D3A;color:#FFF8EC}
  .gp-wh.today .wd{color:#C75D3A}

  .gp-grid{display:grid;position:relative}
  .gp-gutter-col{border-right:1px solid #EADFCB}
  .gp-hourlabel{position:relative;display:flex;justify-content:flex-end;padding-right:8px}
  .gp-hourlabel span{font-size:11px;color:#A89683;font-weight:700;transform:translateY(-7px)}
  .gp-daycol{position:relative;border-left:1px solid #F0E7D6;cursor:copy}
  .gp-slot{border-bottom:1px solid #F4ECDE}
  .gp-slot:nth-child(odd){background:#FFFDF8}

  .gp-nowline{position:absolute;left:0;right:0;height:0;border-top:2px solid #C75D3A;z-index:8;pointer-events:none}
  .gp-nowline span{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#C75D3A}

  .gp-event{position:absolute;z-index:6;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;text-align:left;
    overflow:hidden;display:flex;flex-direction:column;gap:1px;transition:.12s;box-shadow:0 1px 3px rgba(90,74,61,.1);font-family:inherit}
  .gp-event:hover{filter:brightness(.97);box-shadow:0 3px 9px rgba(90,74,61,.18);z-index:9}
  .ev-title{font-size:12.5px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-time{font-size:10.5px;font-weight:700;color:#7A6A5C}
  .ev-note{font-size:10.5px;color:#8A7A6D;line-height:1.25;overflow:hidden}

  /* ---------- OVERLAY / DRAWER / MODAL ---------- */
  .gp-overlay{position:fixed;inset:0;z-index:60;background:rgba(58,46,38,.4);backdrop-filter:blur(3px);
    display:flex;justify-content:flex-end;animation:gp-fade .18s ease}
  .gp-overlay.center{align-items:center;justify-content:center;padding:16px}
  @keyframes gp-fade{from{opacity:0}to{opacity:1}}

  .gp-drawer{width:min(380px,90vw);height:100%;background:#FBF5EA;padding:20px;overflow-y:auto;
    box-shadow:-12px 0 40px rgba(58,46,38,.18);animation:gp-slide .22s cubic-bezier(.2,.7,.3,1)}
  @keyframes gp-slide{from{transform:translateX(30px);opacity:.5}to{transform:translateX(0);opacity:1}}
  .gp-drawer-head{display:flex;align-items:center;justify-content:space-between}
  .gp-drawer-head h2,.gp-modal-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;display:flex;align-items:center;gap:9px}
  .gp-hint{font-size:12.5px;color:#8A7A6D;margin:8px 0 16px;line-height:1.5}

  .gp-actlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
  .gp-actrow{display:flex;align-items:center;gap:6px}
  .gp-actmain{flex:1;display:flex;align-items:center;gap:10px;background:#FFFDF8;border:1px solid #E4D7C2;
    border-radius:11px;padding:11px 13px;cursor:pointer;transition:.15s;text-align:left;font-family:inherit}
  .gp-actmain:hover{background:#F4ECDF;transform:translateX(-2px)}
  .gp-actmain .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .gp-actmain .nm{flex:1;font-weight:700;font-size:14px}
  .gp-actmain .du{font-size:11.5px;color:#A89683;font-weight:700}

  .gp-icon{border:1px solid #E4D7C2;background:#FFFDF8;cursor:pointer;border-radius:9px;width:34px;height:34px;
    display:grid;place-items:center;color:#5A4A3D;transition:.15s;flex-shrink:0}
  .gp-icon:hover{background:#F4ECDF}
  .gp-icon.sm{width:32px;height:42px;border-radius:10px}
  .gp-icon.danger{color:#9E4444}
  .gp-icon.danger:hover{background:#F8E9E9}

  .gp-add{width:100%;border:1.5px dashed #D8C7AC;background:none;border-radius:11px;padding:12px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:13.5px;color:#8A7A6D;transition:.15s;font-family:inherit}
  .gp-add:hover{border-color:#C75D3A;color:#C75D3A;background:#FFF6ED}

  .gp-editcard{background:#FFFDF8;border:1px solid #E4D7C2;border-radius:13px;padding:15px;margin-top:4px}
  .gp-editactions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

  .gp-modal{width:min(520px,100%);max-height:90vh;overflow-y:auto;background:#FBF5EA;border-radius:18px;
    box-shadow:0 24px 60px rgba(58,46,38,.3);animation:gp-pop .2s cubic-bezier(.2,.7,.3,1)}
  @keyframes gp-pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .gp-modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 4px}
  .gp-modal-body{padding:8px 20px 16px}
  .gp-modal-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 20px 20px;border-top:1px solid #EADFCB;margin-top:4px}
  .gp-foot-right{display:flex;gap:8px;margin-left:auto}

  .gp-lbl{display:block;font-size:11.5px;font-weight:800;color:#8A7A6D;text-transform:uppercase;letter-spacing:.4px;margin:14px 0 6px;display:flex;align-items:center}
  .gp-input{width:100%;border:1px solid #E0D2BC;background:#FFFDF8;border-radius:10px;padding:10px 12px;
    font-size:14px;font-family:'Nunito',sans-serif;color:#3A2E26;outline:none;transition:.15s}
  .gp-input:focus{border-color:#C75D3A;box-shadow:0 0 0 3px rgba(199,93,58,.13)}
  .gp-area{resize:vertical;line-height:1.5}
  .gp-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .gp-datetime{display:flex;gap:6px}
  .gp-datetime .gp-input{padding:9px 8px;font-size:13px}

  .gp-chips{display:flex;flex-wrap:wrap;gap:7px}
  .gp-chip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid #E0D2BC;background:#FFFDF8;
    border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;color:#5A4A3D;transition:.15s;font-family:inherit}
  .gp-chip:hover{background:#F4ECDF}
  .gp-chip.on{color:#3A2E26}
  .gp-chip .dot{width:9px;height:9px;border-radius:50%}

  .gp-swatches{display:flex;flex-wrap:wrap;gap:8px}
  .gp-sw{width:30px;height:30px;border-radius:9px;border:2px solid transparent;cursor:pointer;display:grid;place-items:center;transition:.12s}
  .gp-sw:hover{transform:scale(1.1)}
  .gp-sw.on{border-color:#3A2E26;transform:scale(1.08)}

  @media (max-width:640px){
    .hide-sm{display:none}
    .gp-header{padding:12px 14px;gap:10px}
    .gp-cal-wrap{padding:10px 12px 16px}
    .gp-cal{height:calc(100vh - 168px)}
    .gp-controls{width:100%;justify-content:space-between}
    .gp-row2{grid-template-columns:1fr}
    .gp-title{font-size:21px}
  }
</style>
</head>
<body>
<div id="root"><div class="gp-center">Carico…</div></div>

<script type="text/babel" data-presets="react">
/* ============================================================== *
 *  CONFIGURAZIONE FIREBASE — INCOLLA QUI LE TUE CHIAVI            *
 *  Console Firebase → Impostazioni progetto → Le tue app → SDK   *
 * ============================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyDN8_KV1QQnNQK4hQ-7i9882Z_3hHx9rbg",
  authDomain: "calendar-4e472.firebaseapp.com",
  projectId: "calendar-4e472",
  storageBucket: "calendar-4e472.firebasestorage.app",
  messagingSenderId: "267721830851",
  appId: "1:267721830851:web:f213d24d00f6e50af90d76",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const { useState, useEffect, useRef, useMemo } = React;

/* ---------------- Helper ---------------- */
const HOUR_H = 56, DAY_START = 0, DAY_END = 24;
const PALETTE = ["#C75D3A","#D9A441","#7E9B6E","#3E8E8A","#5B7DA8","#8E5B7D","#A8552E","#8A8A4A","#E07856","#4A7058","#4F5D9E","#9E4444"];
const WEEKDAYS = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

const pad = (n)=>String(n).padStart(2,"0");
const toDateKey = (d)=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fromDateKey = (k)=>{const [y,m,dd]=k.split("-").map(Number);return new Date(y,m-1,dd);};
const timeStr = (d)=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;
function hexToRgba(hex,a){const h=hex.replace("#","");return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function startOfWeek(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function sameDay(a,b){return toDateKey(a)===toDateKey(b);}
function minutesInDay(date,ref){const s=new Date(ref);s.setHours(DAY_START,0,0,0);return (date-s)/60000;}
function combine(dateKey,hhmm){const b=fromDateKey(dateKey);const [h,m]=hhmm.split(":").map(Number);b.setHours(h,m,0,0);return b;}
function layoutDay(evs){
  const sorted=[...evs].sort((a,b)=>a._s-b._s||a._e-b._e);const lanes=[];
  const placed=sorted.map((ev)=>{let lane=lanes.findIndex((end)=>end<=ev._s);if(lane===-1){lane=lanes.length;lanes.push(ev._e);}else lanes[lane]=ev._e;return {...ev,_lane:lane};});
  return placed.map((ev)=>{const cl=placed.filter((o)=>o._s<ev._e&&o._e>ev._s);return {...ev,_cols:Math.max(...cl.map((o)=>o._lane))+1};});
}
const DEFAULT_ACTIVITIES = [
  {name:"Lavoro",color:"#5B7DA8",dur:480},{name:"Studio",color:"#3E8E8A",dur:120},
  {name:"Palestra",color:"#C75D3A",dur:90},{name:"Pausa",color:"#D9A441",dur:30},{name:"Sonno",color:"#8E5B7D",dur:480},
];

/* ---------------- Icone (SVG inline) ---------------- */
function Icon({name,size=18,style}){
  const c={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style};
  switch(name){
    case "plus": return <svg {...c}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "x": return <svg {...c}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "check": return <svg {...c}><polyline points="20 6 9 17 4 12"/></svg>;
    case "left": return <svg {...c}><polyline points="15 18 9 12 15 6"/></svg>;
    case "right": return <svg {...c}><polyline points="9 18 15 12 9 6"/></svg>;
    case "trash": return <svg {...c}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    case "pencil": return <svg {...c}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>;
    case "layers": return <svg {...c}><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 12l10 5 10-5"/><path d="M2 17l10 5 10-5"/></svg>;
    case "calendar": return <svg {...c}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>;
    case "note": return <svg {...c}><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11l5-5V5a2 2 0 0 0-2-2z"/><path d="M15 21v-5a1 1 0 0 1 1-1h5"/></svg>;
    case "logout": return <svg {...c}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
    default: return null;
  }
}

/* ================================================================
 *  APP root — gestisce auth
 * ================================================================ */
function App(){
  const [user,setUser]=useState(undefined); // undefined=loading
  useEffect(()=>auth.onAuthStateChanged((u)=>setUser(u||null)),[]);
  if(user===undefined) return <div className="gp-center">Carico…</div>;
  if(!user) return <Login/>;
  return <Scheduler user={user}/>;
}

/* ---------------- Login / Registrazione ---------------- */
function Login(){
  const [mode,setMode]=useState("signin");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  const submit=async()=>{
    setErr("");setBusy(true);
    try{
      if(mode==="signin") await auth.signInWithEmailAndPassword(email.trim(),pw);
      else await auth.createUserWithEmailAndPassword(email.trim(),pw);
    }catch(e){
      const map={
        "auth/invalid-credential":"Email o password non corretti.",
        "auth/invalid-email":"Email non valida.",
        "auth/weak-password":"La password deve avere almeno 6 caratteri.",
        "auth/email-already-in-use":"Questa email è già registrata. Accedi.",
        "auth/wrong-password":"Password errata.",
        "auth/user-not-found":"Nessun account con questa email.",
      };
      setErr(map[e.code]||"Errore: "+(e.code||e.message));
    }finally{setBusy(false);}
  };

  return (
    <div className="gp-login">
      <div className="gp-card">
        <div className="logo">G</div>
        <h1>Giornata</h1>
        <p className="lead">{mode==="signin"?"Accedi alla tua agenda":"Crea il tuo accesso"}</p>
        {err && <div className="gp-err">{err}</div>}
        <label className="gp-lbl">Email</label>
        <input className="gp-input" type="email" autoComplete="email" value={email}
          onChange={(e)=>setEmail(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} placeholder="tu@email.it"/>
        <label className="gp-lbl">Password</label>
        <input className="gp-input" type="password" autoComplete="current-password" value={pw}
          onChange={(e)=>setPw(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()} placeholder="••••••••"/>
        <button className="gp-btn solid block" disabled={busy||!email||!pw} onClick={submit}>
          {busy?"Attendi…":(mode==="signin"?"Entra":"Registrati")}
        </button>
        <div className="gp-switch">
          {mode==="signin"
            ? <span>Primo accesso? <button onClick={()=>{setMode("signup");setErr("");}}>Registrati</button></span>
            : <span>Hai già un account? <button onClick={()=>{setMode("signin");setErr("");}}>Accedi</button></span>}
        </div>
      </div>
    </div>
  );
}

/* ================================================================
 *  Scheduler — l'app vera, con dati su Firestore
 * ================================================================ */
function Scheduler({user}){
  const [activities,setActivities]=useState([]);
  const [events,setEvents]=useState([]);
  const [view,setView]=useState("day");
  const [cursor,setCursor]=useState(()=>{const d=new Date();d.setHours(0,0,0,0);return d;});
  const [libOpen,setLibOpen]=useState(false);
  const [editing,setEditing]=useState(null);

  /* listener realtime */
  useEffect(()=>{
    const u1=db.collection("activities").where("uid","==",user.uid)
      .onSnapshot((s)=>setActivities(s.docs.map((d)=>({id:d.id,...d.data()}))));
    const u2=db.collection("events").where("uid","==",user.uid)
      .onSnapshot((s)=>setEvents(s.docs.map((d)=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();};
  },[user.uid]);

  /* CRUD attività */
  const seedActivities=async()=>{const b=db.batch();DEFAULT_ACTIVITIES.forEach((a)=>{const r=db.collection("activities").doc();b.set(r,{...a,uid:user.uid});});await b.commit();};
  const upsertActivity=async(a)=>{
    if(a.id) await db.collection("activities").doc(a.id).set({name:a.name,color:a.color,dur:a.dur,uid:user.uid});
    else await db.collection("activities").add({name:a.name,color:a.color,dur:a.dur,uid:user.uid});
  };
  const removeActivity=(id)=>db.collection("activities").doc(id).delete();

  /* CRUD eventi */
  const saveEvent=async(ev)=>{
    const payload={activityId:ev.activityId,title:ev.title,color:ev.color,note:ev.note,start:ev.start,end:ev.end,uid:user.uid};
    if(ev.id) await db.collection("events").doc(ev.id).set(payload);
    else await db.collection("events").add(payload);
  };
  const deleteEvent=async(id)=>{await db.collection("events").doc(id).delete();setEditing(null);};

  const days=useMemo(()=>{
    if(view==="day") return [new Date(cursor)];
    const s=startOfWeek(cursor);return Array.from({length:7},(_,i)=>addDays(s,i));
  },[view,cursor]);

  const shift=(n)=>setCursor((c)=>addDays(c,view==="day"?n:n*7));
  const goToday=()=>{const d=new Date();d.setHours(0,0,0,0);setCursor(d);};

  const periodLabel=useMemo(()=>{
    if(view==="day"){const d=cursor;return `${WEEKDAYS[(d.getDay()+6)%7]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
    const s=days[0],e=days[6];
    if(s.getMonth()===e.getMonth()) return `${s.getDate()}–${e.getDate()} ${MONTHS[s.getMonth()]} ${s.getFullYear()}`;
    return `${s.getDate()} ${MONTHS[s.getMonth()].slice(0,3)} – ${e.getDate()} ${MONTHS[e.getMonth()].slice(0,3)} ${e.getFullYear()}`;
  },[view,cursor,days]);

  const newEventAt=(dateKey,hour,minute=0,activity=null)=>{
    const sh=`${pad(hour)}:${pad(minute)}`;
    const endMin=minute+(activity?.dur??60);
    let eh=hour+Math.floor(endMin/60),em=endMin%60;
    if(eh>=24){eh=23;em=59;}
    setEditing({id:null,activityId:activity?.id??null,title:activity?.name??"",color:activity?.color??PALETTE[0],
      startDate:dateKey,startTime:sh,endDate:dateKey,endTime:`${pad(eh)}:${pad(em)}`,note:"",_isNew:true});
  };
  const openEvent=(ev)=>{
    const s=new Date(ev.start),e=new Date(ev.end);
    setEditing({id:ev.id,activityId:ev.activityId,title:ev.title,color:ev.color,startDate:toDateKey(s),startTime:timeStr(s),
      endDate:toDateKey(e),endTime:timeStr(e),note:ev.note||"",_isNew:false});
  };

  return (
    <div className="gp-shell">
      <header className="gp-header">
        <div className="gp-brand">
          <div className="gp-logo">G</div>
          <div><div className="gp-title">Giornata</div><div className="gp-sub">{periodLabel}</div></div>
        </div>
        <div className="gp-controls">
          <div className="gp-seg">
            <button className={view==="day"?"on":""} onClick={()=>setView("day")}><Icon name="calendar" size={15}/> Giorno</button>
            <button className={view==="week"?"on":""} onClick={()=>setView("week")}><Icon name="calendar" size={15}/> Settimana</button>
          </div>
          <div className="gp-nav">
            <button onClick={()=>shift(-1)}><Icon name="left"/></button>
            <button className="today" onClick={goToday}>Oggi</button>
            <button onClick={()=>shift(1)}><Icon name="right"/></button>
          </div>
          <button className="gp-btn ghost" onClick={()=>setLibOpen(true)}><Icon name="layers" size={16}/> <span className="hide-sm">Attività</span></button>
          <button className="gp-btn solid" onClick={()=>newEventAt(toDateKey(view==="day"?cursor:new Date()),new Date().getHours())}><Icon name="plus" size={16}/> <span className="hide-sm">Nuovo</span></button>
          <button className="gp-icon" title="Esci" onClick={()=>auth.signOut()}><Icon name="logout" size={16}/></button>
        </div>
      </header>

      <main className="gp-cal-wrap">
        <Calendar days={days} view={view} events={events} onSlot={newEventAt} onEvent={openEvent}/>
      </main>

      {libOpen && <Library activities={activities} onClose={()=>setLibOpen(false)} onUpsert={upsertActivity}
        onRemove={removeActivity} onSeed={seedActivities}
        onUse={(a)=>{setLibOpen(false);newEventAt(toDateKey(view==="day"?cursor:new Date()),new Date().getHours(),0,a);}}/>}

      {editing && <EventModal draft={editing} activities={activities} onChange={setEditing}
        onClose={()=>setEditing(null)} onDelete={deleteEvent}
        onSave={(d)=>{const start=combine(d.startDate,d.startTime);let end=combine(d.endDate,d.endTime);
          if(end<=start) end=new Date(start.getTime()+30*60000);
          saveEvent({id:d.id,activityId:d.activityId,title:(d.title.trim()||"Senza titolo"),color:d.color,note:d.note,start:start.toISOString(),end:end.toISOString()});
          setEditing(null);}}/>}
    </div>
  );
}

/* ---------------- Calendario ---------------- */
function Calendar({days,view,events,onSlot,onEvent}){
  const scrollRef=useRef(null);
  const hours=Array.from({length:DAY_END-DAY_START},(_,i)=>DAY_START+i);
  useEffect(()=>{if(scrollRef.current) scrollRef.current.scrollTop=(7-DAY_START)*HOUR_H-20;},[view]);

  const handleClick=(e,day)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    let mins=((e.clientY-rect.top)/HOUR_H)*60+DAY_START*60;
    mins=Math.max(0,Math.round(mins/15)*15);
    const h=Math.floor(mins/60),m=mins%60;if(h>=24) return;
    onSlot(toDateKey(day),h,m);
  };
  const dayEvents=(day)=>{
    const ws=new Date(day);ws.setHours(DAY_START,0,0,0);
    const we=new Date(day);we.setHours(DAY_END,0,0,0);
    const list=events.filter((ev)=>new Date(ev.end)>ws&&new Date(ev.start)<we).map((ev)=>({
      ...ev,_s:Math.max(0,minutesInDay(new Date(ev.start),day)),_e:Math.min((DAY_END-DAY_START)*60,minutesInDay(new Date(ev.end),day))}));
    return layoutDay(list);
  };
  const colTmpl=`56px repeat(${days.length}, minmax(${view==="week"?"110px":"0"}, 1fr))`;

  return (
    <div className="gp-cal" ref={scrollRef}>
      {view==="week" && (
        <div className="gp-weekhead" style={{gridTemplateColumns:colTmpl}}>
          <div/>
          {days.map((d)=>(
            <div key={toDateKey(d)} className={`gp-wh ${sameDay(d,new Date())?"today":""}`}>
              <span className="wd">{WEEKDAYS[(d.getDay()+6)%7]}</span><span className="dn">{d.getDate()}</span>
            </div>
          ))}
        </div>
      )}
      <div className="gp-grid" style={{gridTemplateColumns:colTmpl}}>
        <div className="gp-gutter-col">
          {hours.map((h)=><div key={h} className="gp-hourlabel" style={{height:HOUR_H}}><span>{pad(h)}:00</span></div>)}
        </div>
        {days.map((day)=>{
          const evs=dayEvents(day);const now=new Date();const showNow=sameDay(day,now);
          const nowTop=(minutesInDay(now,day)/60)*HOUR_H;
          return (
            <div key={toDateKey(day)} className="gp-daycol" style={{height:(DAY_END-DAY_START)*HOUR_H}} onClick={(e)=>handleClick(e,day)}>
              {hours.map((h)=><div key={h} className="gp-slot" style={{height:HOUR_H}}/>)}
              {showNow && nowTop>=0 && nowTop<=(DAY_END-DAY_START)*HOUR_H && <div className="gp-nowline" style={{top:nowTop}}><span/></div>}
              {evs.map((ev)=>{
                const top=(ev._s/60)*HOUR_H;const height=Math.max(20,((ev._e-ev._s)/60)*HOUR_H-3);
                const w=100/ev._cols,left=ev._lane*w;
                return (
                  <button key={ev.id} className="gp-event"
                    style={{top,height,left:`calc(${left}% + 3px)`,width:`calc(${w}% - 6px)`,background:hexToRgba(ev.color,0.16),borderLeft:`3px solid ${ev.color}`}}
                    onClick={(e)=>{e.stopPropagation();onEvent(ev);}}>
                    <span className="ev-title" style={{color:ev.color}}>{ev.title}</span>
                    {height>34 && <span className="ev-time">{timeStr(new Date(ev.start))}–{timeStr(new Date(ev.end))}</span>}
                    {ev.note && height>56 && <span className="ev-note">{ev.note}</span>}
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- Libreria ---------------- */
function Library({activities,onClose,onUpsert,onRemove,onUse,onSeed}){
  const [draft,setDraft]=useState(null);
  const startNew=()=>setDraft({id:null,name:"",color:PALETTE[0],dur:60});
  return (
    <div className="gp-overlay" onClick={onClose}>
      <aside className="gp-drawer" onClick={(e)=>e.stopPropagation()}>
        <div className="gp-drawer-head"><h2><Icon name="layers" size={18}/> Libreria attività</h2><button className="gp-icon" onClick={onClose}><Icon name="x"/></button></div>
        <p className="gp-hint">Definisci una volta le attività ricorrenti. Toccale per inserirle nel calendario.</p>
        <div className="gp-actlist">
          {activities.map((a)=>(
            <div key={a.id} className="gp-actrow">
              <button className="gp-actmain" onClick={()=>onUse(a)}>
                <span className="dot" style={{background:a.color}}/><span className="nm">{a.name}</span>
                <span className="du">{Math.floor(a.dur/60)}h{a.dur%60?` ${a.dur%60}m`:""}</span>
              </button>
              <button className="gp-icon sm" onClick={()=>setDraft({...a})}><Icon name="pencil" size={15}/></button>
              <button className="gp-icon sm danger" onClick={()=>onRemove(a.id)}><Icon name="trash" size={15}/></button>
            </div>
          ))}
          {activities.length===0 && !draft && (
            <button className="gp-add" onClick={onSeed}><Icon name="plus" size={16}/> Carica attività di esempio</button>
          )}
        </div>
        {draft ? (
          <div className="gp-editcard">
            <input className="gp-input" placeholder="Nome attività" autoFocus value={draft.name} onChange={(e)=>setDraft({...draft,name:e.target.value})}/>
            <label className="gp-lbl">Durata predefinita (minuti)</label>
            <input className="gp-input" type="number" min="5" step="5" value={draft.dur} onChange={(e)=>setDraft({...draft,dur:Number(e.target.value)||0})}/>
            <label className="gp-lbl">Colore</label>
            <Swatches value={draft.color} onPick={(c)=>setDraft({...draft,color:c})}/>
            <div className="gp-editactions">
              <button className="gp-btn ghost sm" onClick={()=>setDraft(null)}>Annulla</button>
              <button className="gp-btn solid sm" disabled={!draft.name.trim()} onClick={()=>{onUpsert(draft);setDraft(null);}}><Icon name="check" size={15}/> Salva</button>
            </div>
          </div>
        ) : (
          <button className="gp-add" onClick={startNew}><Icon name="plus" size={16}/> Nuova attività</button>
        )}
      </aside>
    </div>
  );
}

/* ---------------- Modal evento ---------------- */
function EventModal({draft,activities,onChange,onClose,onSave,onDelete}){
  const set=(p)=>onChange({...draft,...p});
  const multiDay=draft.startDate!==draft.endDate;
  return (
    <div className="gp-overlay center" onClick={onClose}>
      <div className="gp-modal" onClick={(e)=>e.stopPropagation()}>
        <div className="gp-modal-head"><h2>{draft._isNew?"Nuovo impegno":"Modifica impegno"}</h2><button className="gp-icon" onClick={onClose}><Icon name="x"/></button></div>
        <div className="gp-modal-body">
          {activities.length>0 && (<>
            <label className="gp-lbl">Da libreria</label>
            <div className="gp-chips">
              {activities.map((a)=>(
                <button key={a.id} className={`gp-chip ${draft.activityId===a.id?"on":""}`}
                  style={draft.activityId===a.id?{borderColor:a.color,background:hexToRgba(a.color,0.12)}:{}}
                  onClick={()=>set({activityId:a.id,title:a.name,color:a.color})}>
                  <span className="dot" style={{background:a.color}}/> {a.name}
                </button>
              ))}
              <button className={`gp-chip ${!draft.activityId?"on":""}`} onClick={()=>set({activityId:null})}>Personalizzato</button>
            </div>
          </>)}
          <label className="gp-lbl">Titolo</label>
          <input className="gp-input" placeholder="Es. Riunione, Allenamento…" value={draft.title} onChange={(e)=>set({title:e.target.value,activityId:null})}/>
          <div className="gp-row2">
            <div><label className="gp-lbl">Inizio</label><div className="gp-datetime">
              <input className="gp-input" type="date" value={draft.startDate} onChange={(e)=>set({startDate:e.target.value,endDate:multiDay?draft.endDate:e.target.value})}/>
              <input className="gp-input" type="time" value={draft.startTime} onChange={(e)=>set({startTime:e.target.value})}/></div></div>
            <div><label className="gp-lbl">Fine</label><div className="gp-datetime">
              <input className="gp-input" type="date" value={draft.endDate} onChange={(e)=>set({endDate:e.target.value})}/>
              <input className="gp-input" type="time" value={draft.endTime} onChange={(e)=>set({endTime:e.target.value})}/></div></div>
          </div>
          <label className="gp-lbl">Colore</label>
          <Swatches value={draft.color} onPick={(c)=>set({color:c})}/>
          <label className="gp-lbl"><Icon name="note" size={13} style={{marginRight:5}}/>Note</label>
          <textarea className="gp-input gp-area" rows={3} placeholder="Dettagli, luogo, promemoria…" value={draft.note} onChange={(e)=>set({note:e.target.value})}/>
        </div>
        <div className="gp-modal-foot">
          {!draft._isNew ? <button className="gp-btn ghost danger" onClick={()=>onDelete(draft.id)}><Icon name="trash" size={15}/> Elimina</button> : <span/>}
          <div className="gp-foot-right">
            <button className="gp-btn ghost" onClick={onClose}>Annulla</button>
            <button className="gp-btn solid" onClick={()=>onSave(draft)}><Icon name="check" size={16}/> Salva</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Swatches({value,onPick}){
  return (
    <div className="gp-swatches">
      {PALETTE.map((c)=>(
        <button key={c} className={`gp-sw ${value===c?"on":""}`} style={{background:c}} onClick={()=>onPick(c)}>
          {value===c && <Icon name="check" size={13} style={{color:"#fff"}}/>}
        </button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
